<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hobby Horse Championship</title>
  <meta property="og:title" content="Hobby Horse Championship" />
  <meta property="og:description" content="Jump, gallop, and race through show courses with your hobby horse!" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://enderlecasa.com/HorseGame/" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a3320;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #game-container { width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
  <script>
// ============================================================
// HOBBY HORSE CHAMPIONSHIP
// Phaser 3 side-scrolling game with 5 photorealistic hobby horses
// ============================================================

const GW = 900;
const GH = 550;
const GROUND_Y = GH - 80; // Top of the grass — the surface the player stands on

// Horse color schemes — richer palette for realism
const HORSE_COLORS = {
  chestnut: {
    name: 'Chestnut',
    body: '#9A5E2A', hi: '#C4894E', shadow: '#5C3415', dark: '#3A1E0A',
    mane: '#2A1508', maneHi: '#4A2810',
    marking: 'star', markColor: '#F5EDE0',
    dapple: false, earInner: '#D4A080'
  },
  blackBeauty: {
    name: 'Black Beauty',
    body: '#1C1C1C', hi: '#3A3A3A', shadow: '#0A0A0A', dark: '#000',
    mane: '#0A0A0A', maneHi: '#222',
    marking: 'snip', markColor: '#F5EDE0',
    dapple: false, earInner: '#C09080'
  },
  dappleGrey: {
    name: 'Dapple Grey',
    body: '#A8A8A8', hi: '#D0D0D0', shadow: '#707070', dark: '#555',
    mane: '#E8E8E8', maneHi: '#FFF',
    marking: 'none', markColor: '#F5EDE0',
    dapple: true, earInner: '#D0B0B0'
  },
  palomino: {
    name: 'Palomino',
    body: '#D4A76A', hi: '#EAC88E', shadow: '#A07838', dark: '#7A5520',
    mane: '#F5EDE0', maneHi: '#FFF',
    marking: 'blaze', markColor: '#F8F2EA',
    dapple: false, earInner: '#E0C0A0'
  },
  paint: {
    name: 'Paint',
    body: '#8B4513', hi: '#B06030', shadow: '#5C2E0E', dark: '#3A1A05',
    mane: '#2A1508', maneHi: '#4A2810',
    marking: 'tobiano', markColor: '#FFFAF5',
    dapple: false, earInner: '#D4A080'
  }
};

// ============================================================
// SIDE-VIEW HOBBY HORSE — large, detailed profile facing RIGHT
// Canvas: 280 wide x 300 tall (head + neck + stick)
// ============================================================
function createHobbyHorseImage(cs) {
  const W = 280, H = 300;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = true;

  function hexRgb(hex) {
    const n = parseInt(hex.replace('#',''), 16);
    return [(n>>16)&255, (n>>8)&255, n&255];
  }
  function rgba(hex, a) {
    const [r,g,b] = hexRgb(hex);
    return `rgba(${r},${g},${b},${a})`;
  }

  // === WOODEN STICK (angled, held by rider) ===
  ctx.save();
  const stickG = ctx.createLinearGradient(105, 170, 118, 170);
  stickG.addColorStop(0, '#A08050');
  stickG.addColorStop(0.25, '#D4B88C');
  stickG.addColorStop(0.5, '#E8D0A8');
  stickG.addColorStop(0.75, '#C4A06A');
  stickG.addColorStop(1, '#8A6838');
  ctx.fillStyle = stickG;
  ctx.beginPath();
  ctx.moveTo(108, 165);
  ctx.lineTo(100, 295);
  ctx.lineTo(114, 295);
  ctx.lineTo(120, 165);
  ctx.closePath();
  ctx.fill();
  // Wood grain
  ctx.strokeStyle = 'rgba(100,70,30,0.12)';
  ctx.lineWidth = 0.6;
  for (let i = 0; i < 25; i++) {
    const t = i / 25;
    const y = 170 + t * 120;
    const x1 = 108 - t * 8;
    const x2 = 120 - t * 6;
    ctx.beginPath();
    ctx.moveTo(x1 + 2, y + Math.sin(y * 0.08) * 1.5);
    ctx.lineTo(x2 - 2, y + Math.cos(y * 0.1) * 1.5);
    ctx.stroke();
  }
  // Stick highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(112, 168);
  ctx.lineTo(104, 290);
  ctx.stroke();
  ctx.restore();

  // === NECK (connects head to stick) ===
  const neckG = ctx.createLinearGradient(60, 120, 160, 170);
  neckG.addColorStop(0, cs.hi);
  neckG.addColorStop(0.4, cs.body);
  neckG.addColorStop(0.8, cs.shadow);
  neckG.addColorStop(1, cs.dark);
  ctx.fillStyle = neckG;
  ctx.beginPath();
  ctx.moveTo(80, 95);    // top of neck (behind head)
  ctx.bezierCurveTo(75, 110, 80, 140, 95, 160);
  ctx.lineTo(130, 175);  // bottom-right of neck
  ctx.bezierCurveTo(140, 165, 145, 145, 140, 125);
  ctx.bezierCurveTo(135, 110, 125, 100, 115, 95);
  ctx.closePath();
  ctx.fill();

  // Neck shading — dark underside
  const neckShadow = ctx.createLinearGradient(90, 140, 130, 175);
  neckShadow.addColorStop(0, 'rgba(0,0,0,0)');
  neckShadow.addColorStop(1, rgba(cs.dark, 0.35));
  ctx.fillStyle = neckShadow;
  ctx.beginPath();
  ctx.moveTo(80, 95);
  ctx.bezierCurveTo(75, 110, 80, 140, 95, 160);
  ctx.lineTo(130, 175);
  ctx.bezierCurveTo(140, 165, 145, 145, 140, 125);
  ctx.bezierCurveTo(135, 110, 125, 100, 115, 95);
  ctx.closePath();
  ctx.fill();

  // Leather collar where stick meets neck
  ctx.fillStyle = '#5A3820';
  ctx.beginPath();
  ctx.ellipse(113, 170, 18, 7, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#3A2010';
  ctx.lineWidth = 0.8;
  ctx.setLineDash([2, 2]);
  ctx.beginPath();
  ctx.ellipse(113, 170, 16, 5, 0.3, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // === DROP SHADOW ===
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.beginPath();
  ctx.ellipse(140, 70, 62, 55, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // === MAIN HEAD — side profile facing RIGHT ===
  // The head profile: forehead at top-right, nose pointing right, jaw underneath
  ctx.save();
  const headG = ctx.createRadialGradient(145, 55, 10, 150, 65, 65);
  headG.addColorStop(0, cs.hi);
  headG.addColorStop(0.3, cs.body);
  headG.addColorStop(0.65, cs.shadow);
  headG.addColorStop(1, cs.dark);
  ctx.fillStyle = headG;
  ctx.beginPath();
  // Start at poll (top-back of head), trace clockwise
  ctx.moveTo(100, 30);
  // Forehead — curves forward and down
  ctx.bezierCurveTo(110, 15, 135, 5, 165, 10);
  // Nasal bone — long straight-ish slope down to nose
  ctx.bezierCurveTo(185, 14, 210, 30, 225, 55);
  // Nose tip — rounded
  ctx.bezierCurveTo(235, 65, 238, 78, 235, 90);
  // Upper lip curve
  ctx.bezierCurveTo(232, 100, 225, 108, 215, 112);
  // Mouth/chin
  ctx.bezierCurveTo(205, 116, 190, 118, 180, 115);
  // Lower jaw — sweeps back
  ctx.bezierCurveTo(160, 112, 140, 108, 120, 108);
  // Throatlatch area
  ctx.bezierCurveTo(105, 108, 90, 100, 85, 90);
  // Back of jaw/cheek up to poll
  ctx.bezierCurveTo(82, 75, 85, 55, 92, 42);
  ctx.bezierCurveTo(95, 36, 97, 32, 100, 30);
  ctx.closePath();
  ctx.fill();

  // === 3D SHADING LAYERS ===
  // Forehead highlight
  const foreHi = ctx.createRadialGradient(155, 30, 5, 155, 40, 35);
  foreHi.addColorStop(0, rgba(cs.hi, 0.55));
  foreHi.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = foreHi;
  ctx.fill();

  // Cheek/jowl highlight
  const cheekG = ctx.createRadialGradient(135, 75, 5, 140, 80, 30);
  cheekG.addColorStop(0, rgba(cs.hi, 0.3));
  cheekG.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = cheekG;
  ctx.fill();

  // Jaw shadow (underneath)
  const jawG = ctx.createLinearGradient(120, 95, 120, 118);
  jawG.addColorStop(0, 'rgba(0,0,0,0)');
  jawG.addColorStop(1, rgba(cs.dark, 0.5));
  ctx.fillStyle = jawG;
  ctx.fill();

  // Nasal bone ridge highlight
  ctx.strokeStyle = rgba(cs.hi, 0.2);
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(145, 18);
  ctx.bezierCurveTo(170, 22, 200, 38, 220, 58);
  ctx.stroke();
  ctx.restore();

  // === MUZZLE — softer, pinker area at nose end ===
  const muzzG = ctx.createRadialGradient(225, 88, 5, 225, 90, 22);
  muzzG.addColorStop(0, '#EAD4BE');
  muzzG.addColorStop(0.5, '#D8BCA0');
  muzzG.addColorStop(0.8, '#C4A080');
  muzzG.addColorStop(1, rgba(cs.body, 0.4));
  ctx.fillStyle = muzzG;
  ctx.beginPath();
  ctx.ellipse(222, 92, 20, 18, 0.15, 0, Math.PI * 2);
  ctx.fill();

  // Whisker bumps
  ctx.fillStyle = 'rgba(200,180,150,0.25)';
  for (let i = 0; i < 6; i++) {
    ctx.beginPath();
    ctx.ellipse(218 + Math.random() * 16, 95 + Math.random() * 12, 1, 1, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // === NOSTRIL (side view — one large comma-shaped nostril) ===
  ctx.save();
  const nosG = ctx.createRadialGradient(232, 78, 2, 230, 80, 10);
  nosG.addColorStop(0, '#1A0A02');
  nosG.addColorStop(0.5, '#2A1508');
  nosG.addColorStop(0.8, '#4A2A15');
  nosG.addColorStop(1, rgba(cs.shadow, 0.5));
  ctx.fillStyle = nosG;
  ctx.beginPath();
  // Comma/kidney shape
  ctx.moveTo(236, 72);
  ctx.bezierCurveTo(240, 76, 240, 85, 235, 88);
  ctx.bezierCurveTo(230, 91, 225, 86, 226, 80);
  ctx.bezierCurveTo(227, 76, 232, 72, 236, 72);
  ctx.fill();
  // Nostril rim highlight
  ctx.strokeStyle = rgba(cs.hi, 0.35);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(236, 73);
  ctx.bezierCurveTo(239, 76, 239, 83, 236, 86);
  ctx.stroke();
  // Inner depth
  ctx.fillStyle = '#0A0502';
  ctx.beginPath();
  ctx.ellipse(232, 80, 4, 5, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // === MOUTH LINE ===
  ctx.strokeStyle = rgba(cs.dark, 0.5);
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(180, 113);
  ctx.bezierCurveTo(195, 115, 215, 112, 230, 102);
  ctx.stroke();
  // Lip edge
  ctx.strokeStyle = rgba(cs.dark, 0.2);
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(180, 115);
  ctx.bezierCurveTo(195, 117, 215, 114, 228, 104);
  ctx.stroke();

  // === FACE MARKINGS ===
  if (cs.marking === 'star') {
    const sg = ctx.createRadialGradient(150, 30, 3, 150, 30, 14);
    sg.addColorStop(0, cs.markColor);
    sg.addColorStop(0.6, rgba(cs.markColor, 0.5));
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.ellipse(150, 30, 12, 14, 0.1, 0, Math.PI * 2);
    ctx.fill();
  } else if (cs.marking === 'blaze') {
    ctx.fillStyle = rgba(cs.markColor, 0.85);
    ctx.beginPath();
    ctx.moveTo(148, 15);
    ctx.bezierCurveTo(142, 25, 138, 45, 140, 65);
    ctx.bezierCurveTo(142, 80, 150, 95, 165, 105);
    ctx.lineTo(175, 105);
    ctx.bezierCurveTo(185, 95, 190, 80, 188, 65);
    ctx.bezierCurveTo(186, 45, 175, 25, 168, 15);
    ctx.bezierCurveTo(162, 10, 154, 10, 148, 15);
    ctx.fill();
  } else if (cs.marking === 'snip') {
    const sg = ctx.createRadialGradient(222, 95, 3, 222, 95, 10);
    sg.addColorStop(0, cs.markColor);
    sg.addColorStop(0.6, rgba(cs.markColor, 0.4));
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.ellipse(222, 95, 10, 8, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (cs.marking === 'tobiano') {
    ctx.fillStyle = rgba(cs.markColor, 0.8);
    ctx.beginPath();
    ctx.moveTo(120, 50);
    ctx.bezierCurveTo(110, 65, 115, 90, 135, 105);
    ctx.bezierCurveTo(155, 115, 180, 110, 195, 95);
    ctx.bezierCurveTo(210, 75, 195, 50, 175, 40);
    ctx.bezierCurveTo(155, 32, 130, 38, 120, 50);
    ctx.fill();
  }

  // === DAPPLES ===
  if (cs.dapple) {
    for (let i = 0; i < 20; i++) {
      const x = 95 + Math.random() * 130;
      const y = 20 + Math.random() * 85;
      const r = 4 + Math.random() * 7;
      const dG = ctx.createRadialGradient(x, y, 0, x, y, r);
      dG.addColorStop(0, rgba(cs.hi, 0.3));
      dG.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = dG;
      ctx.beginPath();
      ctx.ellipse(x, y, r, r * 0.85, Math.random(), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // === EYE (side view — one large, expressive almond eye) ===
  const ex = 130, ey = 52;

  // Eye socket depression
  ctx.fillStyle = rgba(cs.dark, 0.25);
  ctx.beginPath();
  ctx.ellipse(ex, ey, 18, 14, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // Sclera
  const sclG = ctx.createRadialGradient(ex + 2, ey - 1, 2, ex, ey, 13);
  sclG.addColorStop(0, '#FAFAFA');
  sclG.addColorStop(0.6, '#F0EDE8');
  sclG.addColorStop(1, '#D0C8C0');
  ctx.fillStyle = sclG;
  ctx.beginPath();
  // Almond shape
  ctx.moveTo(ex - 14, ey);
  ctx.bezierCurveTo(ex - 14, ey - 10, ex - 4, ey - 13, ex + 2, ey - 12);
  ctx.bezierCurveTo(ex + 10, ey - 11, ex + 16, ey - 5, ex + 16, ey);
  ctx.bezierCurveTo(ex + 16, ey + 5, ex + 10, ey + 11, ex + 2, ey + 12);
  ctx.bezierCurveTo(ex - 4, ey + 13, ex - 14, ey + 10, ex - 14, ey);
  ctx.fill();

  // Iris
  const iG = ctx.createRadialGradient(ex + 2, ey, 2, ex + 2, ey, 9);
  iG.addColorStop(0, '#2A1505');
  iG.addColorStop(0.25, '#4A2815');
  iG.addColorStop(0.5, '#3A1A08');
  iG.addColorStop(0.75, '#2A1205');
  iG.addColorStop(1, '#1A0A02');
  ctx.fillStyle = iG;
  ctx.beginPath();
  ctx.ellipse(ex + 2, ey, 9, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Iris fibre detail
  ctx.strokeStyle = 'rgba(80,50,20,0.15)';
  ctx.lineWidth = 0.3;
  for (let a = 0; a < Math.PI * 2; a += 0.4) {
    ctx.beginPath();
    ctx.moveTo(ex + 2 + Math.cos(a) * 3, ey + Math.sin(a) * 3.5);
    ctx.lineTo(ex + 2 + Math.cos(a) * 8, ey + Math.sin(a) * 9);
    ctx.stroke();
  }

  // Pupil
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(ex + 2, ey + 0.5, 5, 6.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Primary specular highlight (large, bright)
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.ellipse(ex + 6, ey - 4, 4.5, 3.5, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Secondary highlight
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.beginPath();
  ctx.ellipse(ex - 2, ey + 3, 2.5, 1.5, 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Upper eyelid (heavy, expressive)
  ctx.strokeStyle = rgba(cs.dark, 0.6);
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(ex - 15, ey + 1);
  ctx.bezierCurveTo(ex - 10, ey - 14, ex + 8, ey - 14, ex + 17, ey - 1);
  ctx.stroke();

  // Eyelashes (top)
  ctx.strokeStyle = rgba(cs.dark, 0.5);
  ctx.lineWidth = 1.2;
  ctx.lineCap = 'round';
  for (let i = 0; i < 5; i++) {
    const t = 0.2 + i * 0.15;
    const lx = ex - 10 + t * 28;
    const ly = ey - 12 + Math.sin(t * Math.PI) * 1;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(lx - 2 + i, ly - 5 - Math.random() * 3);
    ctx.stroke();
  }

  // Lower eyelid
  ctx.strokeStyle = rgba(cs.shadow, 0.35);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(ex - 13, ey + 1);
  ctx.bezierCurveTo(ex - 6, ey + 13, ex + 8, ey + 13, ex + 16, ey + 1);
  ctx.stroke();

  // === EAR (side view — one ear visible, pointing up-forward) ===
  ctx.save();
  ctx.translate(115, 18);
  ctx.rotate(-0.2);
  // Outer ear
  const earG = ctx.createLinearGradient(-6, -28, 6, -28);
  earG.addColorStop(0, cs.shadow);
  earG.addColorStop(0.4, cs.body);
  earG.addColorStop(0.7, cs.hi);
  earG.addColorStop(1, cs.shadow);
  ctx.fillStyle = earG;
  ctx.beginPath();
  ctx.moveTo(-10, 4);
  ctx.bezierCurveTo(-14, -10, -8, -28, 0, -36);
  ctx.bezierCurveTo(8, -28, 14, -10, 10, 4);
  ctx.closePath();
  ctx.fill();
  // Inner ear
  const innerG = ctx.createLinearGradient(0, -30, 0, 0);
  innerG.addColorStop(0, cs.earInner);
  innerG.addColorStop(1, rgba(cs.earInner, 0.2));
  ctx.fillStyle = innerG;
  ctx.beginPath();
  ctx.moveTo(-6, 0);
  ctx.bezierCurveTo(-8, -10, -5, -24, 0, -30);
  ctx.bezierCurveTo(5, -24, 8, -10, 6, 0);
  ctx.closePath();
  ctx.fill();
  // Ear edge highlight
  ctx.strokeStyle = rgba(cs.hi, 0.3);
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(8, 2);
  ctx.bezierCurveTo(12, -10, 6, -26, 0, -34);
  ctx.stroke();
  ctx.restore();

  // === MANE — flowing down the crest of the neck, cascading left ===
  ctx.lineCap = 'round';
  // Mane attaches along the top of the head/neck
  for (let i = 0; i < 30; i++) {
    const t = i / 30;
    // Follow the crest from poll to withers
    const sx = 105 + t * 30;
    const sy = 28 + t * 65 + Math.sin(t * 3) * 5;
    // Strands fall to the left (away from viewer in side view)
    const endX = sx - 20 - Math.random() * 15;
    const endY = sy + 10 + Math.random() * 15;
    const cpx = sx - 10 + Math.sin(i * 0.5) * 8;
    const cpy = sy + 5;

    // Shadow
    ctx.strokeStyle = rgba(cs.mane, 0.4);
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(sx + 1, sy + 1);
    ctx.quadraticCurveTo(cpx + 1, cpy + 1, endX + 1, endY + 1);
    ctx.stroke();

    // Main strand
    ctx.strokeStyle = i % 3 === 0 ? cs.maneHi : cs.mane;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo(cpx, cpy, endX, endY);
    ctx.stroke();

    // Highlight
    if (i % 4 === 0) {
      ctx.strokeStyle = rgba(cs.maneHi, 0.35);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sx - 1, sy - 1);
      ctx.quadraticCurveTo(cpx - 1, cpy - 1, endX - 1, endY - 1);
      ctx.stroke();
    }
  }

  // === BRIDLE (side view) ===
  const bCol = '#3A2010';

  // Crownpiece (over poll, behind ear)
  ctx.strokeStyle = bCol;
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.moveTo(100, 32);
  ctx.quadraticCurveTo(110, 20, 125, 22);
  ctx.stroke();

  // Browband (across forehead)
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(125, 28);
  ctx.quadraticCurveTo(140, 24, 150, 28);
  ctx.stroke();

  // Cheekpiece (vertical, down the face)
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(145, 28);
  ctx.bezierCurveTo(148, 45, 155, 65, 168, 82);
  ctx.stroke();

  // Noseband (across the nose)
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(168, 82);
  ctx.bezierCurveTo(180, 80, 200, 76, 215, 78);
  ctx.stroke();

  // Throatlatch (under jaw)
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(100, 35);
  ctx.bezierCurveTo(105, 55, 115, 80, 130, 100);
  ctx.stroke();

  // Reins (from bit area, hanging down)
  ctx.strokeStyle = bCol;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(178, 108);
  ctx.bezierCurveTo(170, 120, 155, 135, 140, 145);
  ctx.stroke();

  // Bit ring (metal circle at mouth)
  ctx.strokeStyle = '#AAA';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(180, 108, 5, 0, Math.PI * 2);
  ctx.stroke();

  // Buckle on cheekpiece
  ctx.fillStyle = '#D4A830';
  ctx.fillRect(143, 48, 7, 7);
  ctx.strokeStyle = '#A08020';
  ctx.lineWidth = 0.8;
  ctx.strokeRect(143, 48, 7, 7);

  // Bridle stitching
  ctx.strokeStyle = 'rgba(80,50,25,0.3)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([2, 2.5]);
  ctx.beginPath();
  ctx.moveTo(147, 30);
  ctx.bezierCurveTo(150, 48, 157, 68, 170, 84);
  ctx.stroke();
  ctx.setLineDash([]);

  // === FUR TEXTURE — directional strokes following the face profile ===
  ctx.lineCap = 'round';
  for (let i = 0; i < 150; i++) {
    const x = 90 + Math.random() * 145;
    const y = 15 + Math.random() * 100;
    // Direction: generally pointing toward the nose (right and slightly down)
    const angle = 0.2 + Math.random() * 0.5;
    const len = 2 + Math.random() * 3;
    ctx.strokeStyle = i % 3 === 0
      ? rgba(cs.hi, 0.07) : rgba(cs.dark, 0.05);
    ctx.lineWidth = 0.4 + Math.random() * 0.4;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(angle) * len, y + Math.sin(angle) * len);
    ctx.stroke();
  }

  // === VEIN detail (subtle, on cheek/forehead) ===
  ctx.strokeStyle = rgba(cs.shadow, 0.12);
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.moveTo(140, 35);
  ctx.bezierCurveTo(150, 45, 155, 55, 158, 70);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(125, 60);
  ctx.bezierCurveTo(135, 65, 145, 68, 155, 72);
  ctx.stroke();

  return c.toDataURL();
}

function createRunnerImage() {

  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(20, 6, 10, 4, 0, Math.PI, Math.PI * 2);

  ctx.fillStyle = '#E8C8A8';
  ctx.beginPath();

  // Hand

function createJumpImage() {
  const c = document.createElement('canvas');
  c.width = 70; c.height = 50;
  const ctx = c.getContext('2d');

  // Support standards (white posts)
  ctx.fillStyle = '#F0F0F0';
  ctx.fillRect(4, 5, 6, 45);
  ctx.fillRect(60, 5, 6, 45);
  // Post shadows
  ctx.fillStyle = '#D0D0D0';
  ctx.fillRect(8, 5, 2, 45);
  ctx.fillRect(64, 5, 2, 45);
  // Post tops (cups)
  ctx.fillStyle = '#888';
  ctx.fillRect(2, 3, 10, 4);
  ctx.fillRect(58, 3, 10, 4);

  // Rails (red/white striped)
  for (let r = 0; r < 2; r++) {
    const ry = 10 + r * 16;
    // Rail shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(8, ry + 2, 54, 8);
    // Rail body
    const railG = ctx.createLinearGradient(0, ry, 0, ry + 8);
    railG.addColorStop(0, r === 0 ? '#E8E8E8' : '#CC2020');
    railG.addColorStop(0.5, r === 0 ? '#FFF' : '#FF3030');
    railG.addColorStop(1, r === 0 ? '#D0D0D0' : '#AA1818');
    ctx.fillStyle = railG;
    ctx.fillRect(8, ry, 54, 8);
  }

  return c.toDataURL();
}

function createCarrotImage() {
  const c = document.createElement('canvas');
  c.width = 48; c.height = 64;
  const ctx = c.getContext('2d');

  // Carrot body (larger)
  const carG = ctx.createLinearGradient(14, 14, 34, 58);
  carG.addColorStop(0, '#FF9030');
  carG.addColorStop(0.5, '#FF7010');
  carG.addColorStop(1, '#CC5500');
  ctx.fillStyle = carG;
  ctx.beginPath();
  ctx.moveTo(16, 18);
  ctx.quadraticCurveTo(8, 38, 24, 62);
  ctx.quadraticCurveTo(40, 38, 32, 18);
  ctx.closePath();
  ctx.fill();

  // Carrot highlight
  ctx.fillStyle = 'rgba(255,200,100,0.25)';
  ctx.beginPath();
  ctx.ellipse(20, 32, 4, 16, -0.1, 0, Math.PI * 2);
  ctx.fill();

  // Carrot lines
  ctx.strokeStyle = 'rgba(180,80,0,0.25)';
  ctx.lineWidth = 0.8;
  for (let y = 24; y < 54; y += 6) {
    ctx.beginPath();
    ctx.moveTo(13, y);
    ctx.lineTo(35, y);
    ctx.stroke();
  }

  // Green top (leafy)
  ctx.fillStyle = '#228B22';
  for (let i = -3; i <= 3; i++) {
    ctx.beginPath();
    ctx.moveTo(24, 18);
    ctx.quadraticCurveTo(24 + i * 5, 6, 24 + i * 7, 0);
    ctx.quadraticCurveTo(24 + i * 5, 8, 24, 18);
    ctx.fill();
  }
  // Darker green accents
  ctx.fillStyle = '#1A6B1A';
  for (let i = -1; i <= 1; i += 2) {
    ctx.beginPath();
    ctx.moveTo(24, 18);
    ctx.quadraticCurveTo(24 + i * 4, 4, 24 + i * 6, 1);
    ctx.quadraticCurveTo(24 + i * 4, 6, 24, 18);
    ctx.fill();
  }

  return c.toDataURL();
}

function createHorseshoeImage() {
  const c = document.createElement('canvas');
  c.width = 56; c.height = 56;
  const ctx = c.getContext('2d');

  // Outer glow
  ctx.fillStyle = 'rgba(255,215,0,0.15)';
  ctx.beginPath();
  ctx.arc(28, 26, 26, 0, Math.PI * 2);
  ctx.fill();

  // Horseshoe (larger, thicker)
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(28, 24, 20, 0.3, Math.PI - 0.3);
  ctx.stroke();

  // Inner highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(28, 24, 17, 0.5, Math.PI - 0.5);
  ctx.stroke();

  // Outer shadow
  ctx.strokeStyle = 'rgba(180,140,0,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(28, 24, 23, 0.4, Math.PI - 0.4);
  ctx.stroke();

  // Nail holes
  ctx.fillStyle = '#DAA520';
  const angles = [0.5, 0.9, 1.4, Math.PI - 1.4, Math.PI - 0.9, Math.PI - 0.5];
  angles.forEach(a => {
    ctx.beginPath();
    ctx.arc(28 + Math.cos(a) * 19, 24 + Math.sin(a) * 19, 2, 0, Math.PI * 2);
    ctx.fill();
  });

  return c.toDataURL();
}

function createWaterImage() {
  const c = document.createElement('canvas');
  c.width = 80; c.height = 30;
  const ctx = c.getContext('2d');
  const wG = ctx.createLinearGradient(0, 0, 0, 30);
  wG.addColorStop(0, '#64B5F6');
  wG.addColorStop(1, '#1565C0');
  ctx.fillStyle = wG;
  ctx.fillRect(0, 0, 80, 30);
  // Waves
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1.5;
  for (let row = 0; row < 4; row++) {
    ctx.beginPath();
    for (let x = 0; x <= 80; x += 2) {
      const y = 5 + row * 7 + Math.sin(x * 0.14 + row) * 2.5;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  // Sparkle highlights
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.ellipse(10 + Math.random() * 60, 5 + Math.random() * 20, 2, 1, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  return c.toDataURL();
}

function createHedgeImage() {

function createDustImage() {

// ============================================================
// BOOT SCENE — load all textures, wait for async completion
// ============================================================
class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }

  create() {
    this.add.rectangle(GW / 2, GH / 2, GW, GH, 0x1a3320);
    this.add.text(GW / 2, GH / 2, 'Loading...', {
      fontFamily: "'Georgia', serif", fontSize: 28, color: '#FFD700'
    }).setOrigin(0.5);

    const expected = new Set([
      'chestnut','blackBeauty','dappleGrey','palomino','paint',
      'carrot','horseshoe','runner1','runner2','jump','water','hedge','dust'
    ]);
    const loaded = new Set();

    const checkDone = (key) => {
      if (expected.has(key)) {
        loaded.add(key);
        if (loaded.size >= expected.size) {
          this.textures.off('addtexture', checkDone);
          this.scene.start('TitleScene');
        }
      }
    };
    this.textures.on('addtexture', checkDone);

    // Generate textures
    Object.keys(HORSE_COLORS).forEach(k =>
      this.textures.addBase64(k, createHobbyHorseImage(HORSE_COLORS[k]))
    );
    this.textures.addBase64('carrot', createCarrotImage());
    this.textures.addBase64('horseshoe', createHorseshoeImage());
    this.textures.addBase64('runner1', createRunnerImage());
    this.textures.addBase64('runner2', createRunnerImage2());
    this.textures.addBase64('jump', createJumpImage());
    this.textures.addBase64('water', createWaterImage());
    this.textures.addBase64('hedge', createHedgeImage());
    this.textures.addBase64('dust', createDustImage());

    // Safety timeout
    this.time.delayedCall(6000, () => {
      if (loaded.size < expected.size) {
        this.textures.off('addtexture', checkDone);
        this.scene.start('TitleScene');
      }
    });
  }
}

// ============================================================
// SELECT SCENE — choose your horse
// ============================================================
class SelectScene extends Phaser.Scene {
  constructor() { super('SelectScene'); this.selectedIndex = 0; }

  create() {
    this.selectedIndex = 0;
    this.add.rectangle(GW / 2, GH / 2, GW, GH, 0xB0D4E3);
    this.add.rectangle(GW / 2, GH - 40, GW, 80, 0x2d5016);

    // Title
    this.add.rectangle(GW / 2, 45, 500, 60, 0x000000, 0.7).setStrokeStyle(2, 0xFFD700);
    this.add.text(GW / 2, 45, 'Choose Your Horse', {
      fontFamily: "'Georgia', serif", fontSize: 32, fontStyle: 'bold', color: '#FFD700'
    }).setOrigin(0.5);

    const keys = Object.keys(HORSE_COLORS);
    const names = keys.map(k => HORSE_COLORS[k].name);
    const spacing = GW / (keys.length + 1);

    this.horses = [];
    this.selectionRing = null;

    keys.forEach((key, i) => {
      const x = spacing * (i + 1);
      const y = 210;

      // Background circle
      const bg = this.add.circle(x, y, 58, 0x000000, 0.2);

      // Horse image (side-view profile)
      const horse = this.add.image(x, y - 5, key).setScale(0.3);

      // Name
      this.add.rectangle(x, y + 58, 100, 24, 0x000000, 0.6);
      const label = this.add.text(x, y + 58, names[i], {
        fontFamily: "'Georgia', serif", fontSize: 14, color: '#FFFFFF'
      }).setOrigin(0.5);

      // Quote below each horse
      const quotes = [
        '"If I smell like a horse\nit\'s not a bad thing"',
        '"Horses Keep\nMe Stable."',
        '"I Like Horses, Dogs,\nMaybe 3 People."',
        '"Barn Hair,\nDon\'t Care."',
        '"You either like horses,\nor you\'re wrong."'
      ];
      this.add.rectangle(x, y + 100, 140, 44, 0x000000, 0.5);
      this.add.text(x, y + 100, quotes[i], {
        fontFamily: "'Georgia', serif", fontSize: 9, fontStyle: 'italic',
        color: '#FFE4B5', align: 'center', lineSpacing: 2
      }).setOrigin(0.5);

      this.horses.push({ key, x, y, horse, bg, label });

      // Click/tap to select
      bg.setInteractive(new Phaser.Geom.Circle(0, 0, 58), Phaser.Geom.Circle.Contains);
      horse.setInteractive();
      bg.on('pointerdown', () => { this.selectedIndex = i; this.updateSelection(); this.time.delayedCall(250, () => this.startGame()); });
      horse.on('pointerdown', () => { this.selectedIndex = i; this.updateSelection(); this.time.delayedCall(250, () => this.startGame()); });
    });

    // Selection ring
    this.selectionRing = this.add.circle(0, 0, 64).setStrokeStyle(4, 0xFFD700);
    this.updateSelection();

    // Instructions
    this.add.rectangle(GW / 2, GH - 100, 500, 70, 0x000000, 0.7);
    this.add.text(GW / 2, GH - 110, 'Arrow Keys / Tap to select', {
      fontFamily: "'Georgia', serif", fontSize: 16, color: '#FFFFFF'
    }).setOrigin(0.5);
    this.add.text(GW / 2, GH - 88, 'ENTER / SPACE / Tap horse to start', {
      fontFamily: "'Georgia', serif", fontSize: 16, color: '#FFD700'
    }).setOrigin(0.5);

    // Keyboard
    this.input.keyboard.on('keydown-LEFT', () => {
      this.selectedIndex = (this.selectedIndex - 1 + keys.length) % keys.length;
      this.updateSelection();
    });
    this.input.keyboard.on('keydown-RIGHT', () => {
      this.selectedIndex = (this.selectedIndex + 1) % keys.length;
      this.updateSelection();
    });
    this.input.keyboard.on('keydown-RETURN', () => this.startGame());
    this.input.keyboard.on('keydown-SPACE', () => this.startGame());
  }

  updateSelection() {
    const h = this.horses[this.selectedIndex];
    this.selectionRing.setPosition(h.x, h.y);
    this.horses.forEach((item, i) => {
      item.horse.setScale(i === this.selectedIndex ? 0.4 : 0.3);
      item.bg.setFillStyle(i === this.selectedIndex ? 0x2d5016 : 0x000000, i === this.selectedIndex ? 0.3 : 0.2);
    });
  }

  startGame() {
    this.scene.start('GameScene', { horse: this.horses[this.selectedIndex].key });
  }
}

// GAME SCENE — main gameplay
// ============================================================
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  init(data) { this.selectedHorse = data.horse || 'chestnut'; }

  create() {
    // Sky
    this.add.rectangle(GW / 2, GH / 2, GW, GH, 0xB0D4E3);

    // Clouds
    this.clouds = [];
    for (let i = 0; i < 4; i++) {
      const cx = 80 + i * 220 + Math.random() * 40;
      const cy = 40 + Math.random() * 50;
      const cloud = this.add.container(cx, cy);
      for (let j = 0; j < 3; j++) {
        cloud.add(this.add.ellipse(j * 20 - 20, Math.random() * 6, 40 + Math.random() * 20, 18 + Math.random() * 8, 0xFFFFFF, 0.7));
      }
      this.clouds.push(cloud);
    }

    // Grass layers (parallax look)
    this.add.rectangle(GW / 2, GROUND_Y + 40, GW, 80, 0x2d5016);
    this.add.rectangle(GW / 2, GROUND_Y + 2, GW, 6, 0x3d7a1e);

    // === PHYSICS GROUND — exactly at the grass surface ===
    const ground = this.add.rectangle(GW / 2, GROUND_Y + 4, GW, 8, 0x000000, 0);
    this.physics.add.existing(ground, true);
    this.ground = ground;

    // Game state
    this.scrollSpeed = 5;
    this.gameActive = true;
    this.score = 0;
    this.faults = 0;
    this.distance = 0;
    this.cleanStreakCounter = 0;
    this.lastMilestone = 0;
    this.maxJumps = 3;
    this.jumpsLeft = 3;
    this.isOnGround = true;
    this.usedExtraJump = false;
    this.baseSpeed = 5;
    this.spawnTimer = 0;
    this.hitCooldown = false;

    // === PLAYER — combined rider + horse as a container ===
    // Runner sprite (the body)
    this.player = this.physics.add.sprite(150, GROUND_Y - 30, 'runner1');
    this.player.setSize(24, 50); // tighter hitbox
    this.player.setBounce(0);
    this.player.setCollideWorldBounds(true);
    this.player.body.setGravityY(200); // extra gravity for snappier feel

    // Horse head (side-view profile, follows player)
    this.playerHorse = this.add.image(170, GROUND_Y - 70, this.selectedHorse);
    this.playerHorse.setScale(0.38);
    this.playerHorse.setOrigin(0.4, 0.7); // anchor near bottom-center so it rises with player

    // Animation
    if (!this.anims.exists('run')) {
      this.anims.create({
        key: 'run',
        frames: [{ key: 'runner1' }, { key: 'runner2' }],
        frameRate: 8, repeat: -1
      });
    }
    this.player.play('run');

    // Groups
    this.obstacles = this.physics.add.group();
    this.collectibles = this.physics.add.group();

    // Ground collision
    this.physics.add.collider(this.player, this.ground, () => {
      // Reliable ground detection via collider callback
      if (!this.isOnGround) {
        this.isOnGround = true;
        if (this.usedExtraJump) {
          this.usedExtraJump = false;
          this.addScore(50, 'STYLE! +50', 0xAA44FF);
        }
        this.jumpsLeft = 3;
      }
    });

    // Obstacle/collectible overlap
    this.physics.add.overlap(this.player, this.obstacles, (p, obs) => this.hitObstacle(obs));
    this.physics.add.overlap(this.player, this.collectibles, (p, col) => this.collectItem(col));

    // === CONTROLS — keyboard + touch ===
    // Jump
    this.input.keyboard.on('keydown-SPACE', () => this.jump());
    this.input.keyboard.on('keydown-UP', () => this.jump());
    this.input.keyboard.on('keydown-W', () => this.jump());

    // Speed control — RIGHT arrow speeds up, LEFT slows down
    this.cursors = this.input.keyboard.createCursorKeys();

    // Touch/click — tap anywhere to jump
    this.input.on('pointerdown', (pointer) => {
      if (pointer.y > 60) this.jump();
    });

    // HUD
    this.createHUD();
  }

  createHUD() {
    const hudBg = this.add.rectangle(0, 0, GW, 50, 0x000000, 0.75);
    hudBg.setOrigin(0, 0);
    hudBg.setDepth(100);

    this.scoreText = this.add.text(20, 25, 'Score: 0', {
      fontFamily: "'Georgia', serif", fontSize: 20, fontStyle: 'bold', color: '#FFD700'
    }).setOrigin(0, 0.5).setDepth(100);

    this.distanceText = this.add.text(GW / 2, 25, '0m', {
      fontFamily: "'Georgia', serif", fontSize: 18, color: '#FFFFFF'
    }).setOrigin(0.5).setDepth(100);

    // Fault indicators (3 horse shoes — fill red when faulted)
    this.faultIcons = [];
    for (let i = 0; i < 3; i++) {
      const icon = this.add.text(GW - 100 + i * 30, 25, '\u2764', {
        fontSize: 22, color: '#FF6B6B'
      }).setOrigin(0.5).setDepth(100);
      this.faultIcons.push(icon);
    }

    // Jump indicator
    this.jumpIndicator = this.add.text(GW - 180, 25, 'JUMPS: 3', {
      fontFamily: "'Georgia', serif", fontSize: 14, color: '#88DDFF'
    }).setOrigin(0.5).setDepth(100);

    // Speed indicator
    this.speedText = this.add.text(GW - 280, 25, '', {
      fontFamily: "'Georgia', serif", fontSize: 14, color: '#90EE90'
    }).setOrigin(0.5).setDepth(100);
  }

  jump() {
    if (!this.gameActive) return;

    if (this.jumpsLeft > 0) {
      // Triple jump: 1st=-420, 2nd=-350, 3rd=-280
      const jumpNum = this.maxJumps - this.jumpsLeft + 1; // 1, 2, or 3
      const force = jumpNum === 1 ? -420 : jumpNum === 2 ? -350 : -280;

      this.player.setVelocityY(force);
      this.jumpsLeft--;
      this.isOnGround = false;

      // Update HUD
      this.jumpIndicator.setText('JUMPS: ' + this.jumpsLeft);

      if (jumpNum >= 2) {
        this.usedExtraJump = true;
        // Dust puff visual effect
        const puffCount = jumpNum === 3 ? 6 : 4;
        const puffColor = jumpNum === 3 ? 0xFFDD44 : 0xCCCCCC;
        for (let i = 0; i < puffCount; i++) {
          const p = this.add.circle(
            this.player.x + Phaser.Math.Between(-12, 12),
            this.player.y + 20,
            Phaser.Math.Between(3, 7), puffColor, 0.5
          );
          p.setDepth(50);
          this.tweens.add({
            targets: p, y: p.y + 20, alpha: 0, scale: 2.5,
            duration: 400, onComplete: () => p.destroy()
          });
        }
        // Jump label
        const label = jumpNum === 3 ? 'TRIPLE JUMP!' : 'DOUBLE JUMP!';
        const color = jumpNum === 3 ? '#FFD700' : '#88DDFF';
        this.showFloatingText(this.player.x, this.player.y - 40, label, color);
      }
    }
  }

  update(time, delta) {
    if (!this.gameActive) return;

    // === SPEED CONTROL — right arrow speeds up, left slows down ===
    if (this.cursors.right.isDown) {
      this.scrollSpeed = Math.min(14, this.scrollSpeed + 0.08);
    } else if (this.cursors.left.isDown) {
      this.scrollSpeed = Math.max(2, this.scrollSpeed - 0.08);
    }
    // Show speed feedback
    if (this.scrollSpeed > this.baseSpeed + 1) {
      this.speedText.setText('FAST >>');
      this.speedText.setColor('#FFD700');
    } else if (this.scrollSpeed < this.baseSpeed - 1) {
      this.speedText.setText('<< SLOW');
      this.speedText.setColor('#88BBFF');
    } else {
      this.speedText.setText('');
    }

    // Horse follows player — positioned so the stick aligns with hands
    this.playerHorse.x = this.player.x + 22;
    this.playerHorse.y = this.player.y - 15;

    // Bob horse slightly when running on ground
    if (this.isOnGround) {
      this.playerHorse.y += Math.sin(time * 0.008) * 2.5;
      this.playerHorse.rotation = Math.sin(time * 0.006) * 0.03; // gentle sway
    } else {
      // Tilt forward slightly when jumping
      this.playerHorse.rotation = -0.08;
    }

    // Cloud parallax
    this.clouds.forEach(cloud => {
      cloud.x -= this.scrollSpeed * 0.15;
      if (cloud.x < -80) cloud.x = GW + 80;
    });

    // Distance
    this.distance += this.scrollSpeed / 100;
    this.distanceText.setText(Math.floor(this.distance) + 'm');

    // Milestone bonus
    const milestone = Math.floor(this.distance / 50);
    if (milestone > this.lastMilestone) {
      this.lastMilestone = milestone;
      this.addScore(50, '50m BONUS!', 0xFFD700);
      // Gradually increase base speed
      this.baseSpeed = Math.min(10, 5 + milestone * 0.3);
      this.scrollSpeed = Math.max(this.scrollSpeed, this.baseSpeed);
    }

    // Spawn obstacles
    this.spawnTimer += delta;
    const spawnInterval = Math.max(1200, 2800 - this.distance * 3);
    if (this.spawnTimer > spawnInterval) {
      this.spawnTimer = 0;
      this.spawnObstacle();
    }

    // Spawn collectibles
    if (Math.random() < 0.008) {
      this.spawnCollectible();
    }

    // Check obstacle clears
    this.obstacles.children.entries.forEach(obs => {
      if (obs.active && !obs.getData('cleared') && obs.x < this.player.x - 30) {
        obs.setData('cleared', true);
        this.cleanStreakCounter++;
        this.addScore(100, 'CLEAR! +100', 0x4CAF50);
        if (this.cleanStreakCounter >= 3 && this.cleanStreakCounter % 3 === 0) {
          this.addScore(200, 'PERFECT STREAK! +200', 0xFF8C00);
        }
      }
    });

    // Ground detection backup (in case collider doesn't fire)
    if (this.player.body.blocked.down && !this.isOnGround) {
      this.isOnGround = true;
      this.jumpsLeft = 3;
    }

    // Update jump indicator
    this.jumpIndicator.setText('JUMPS: ' + this.jumpsLeft);

    // Cleanup off-screen objects
    this.obstacles.children.entries.forEach(obs => {
      if (obs.active && obs.x < -100) obs.destroy();
    });
    this.collectibles.children.entries.forEach(col => {
      if (col.active && col.x < -100) col.destroy();
    });
  }

  spawnObstacle() {
    const types = ['jump', 'water', 'hedge'];
    const type = types[Math.floor(Math.random() * types.length)];

    // Place obstacles on the ground
    let yPos;
    if (type === 'water') {
      yPos = GROUND_Y - 8; // flat on ground
    } else {
      yPos = GROUND_Y - 22; // slightly above ground
    }

    const obs = this.obstacles.create(GW + 60, yPos, type);
    obs.body.allowGravity = false;
    obs.body.immovable = true;
    obs.setVelocityX(-this.scrollSpeed * 30);
    obs.setData('type', type);
    obs.setData('cleared', false);
  }

  spawnCollectible() {
    const isHorseshoe = Math.random() < 0.12;
    const type = isHorseshoe ? 'horseshoe' : 'carrot';
    // Collectibles float in the air — reachable by jumping
    const yPos = GROUND_Y - 80 - Math.random() * 120;

    const col = this.collectibles.create(GW + 50, yPos, type);
    col.body.allowGravity = false;
    col.setVelocityX(-this.scrollSpeed * 30);
    col.setData('type', type);
  }

  hitObstacle(obs) {
    if (!this.gameActive || this.hitCooldown) return;
    this.hitCooldown = true;
    this.time.delayedCall(800, () => { this.hitCooldown = false; });

    this.faults++;
    this.cleanStreakCounter = 0;

    // Update fault hearts
    if (this.faults <= 3 && this.faultIcons[this.faults - 1]) {
      this.faultIcons[this.faults - 1].setColor('#333');
    }

    // Camera shake
    this.cameras.main.shake(200, 0.01);

    // Knockback flash
    this.player.setTint(0xFF0000);
    this.time.delayedCall(300, () => { this.player.clearTint(); });

    // Dust
    const dust = this.add.sprite(this.player.x, this.player.y, 'dust').setAlpha(0.8);
    this.tweens.add({ targets: dust, alpha: 0, scale: 2, duration: 400, onComplete: () => dust.destroy() });

    if (obs && obs.active) obs.destroy();

    this.showFloatingText(this.player.x, this.player.y - 50, 'FAULT!', '#FF4444');

    if (this.faults >= 3) {
      this.gameActive = false;
      this.time.delayedCall(600, () => this.gameOver());
    }
  }

  collectItem(col) {
    const type = col.getData('type');
    if (type === 'carrot') {
      this.addScore(25, '+25', 0xFF8C00);
    } else if (type === 'horseshoe') {
      this.addScore(100, 'LUCKY! +100', 0xFFD700);
    }
    col.destroy();
  }

  addScore(points, label, color) {
    this.score += points;
    this.scoreText.setText('Score: ' + this.score);
    this.showFloatingText(GW / 2, 80, label, '#' + color.toString(16).padStart(6, '0'));
  }

  showFloatingText(x, y, text, color) {
    const ft = this.add.text(x, y, text, {
      fontFamily: "'Georgia', serif", fontSize: 22, fontStyle: 'bold',
      color: color, stroke: '#000', strokeThickness: 2
    }).setOrigin(0.5).setDepth(90);
    this.tweens.add({
      targets: ft, y: y - 50, alpha: 0,
      duration: 1000, onComplete: () => ft.destroy()
    });
  }

  gameOver() {
    this.scene.start('GameOverScene', {
      score: this.score,
      distance: Math.floor(this.distance)
    });
  }
}

// ============================================================
// GAME OVER SCENE
// ============================================================
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOverScene'); }

  init(data) {
    this.finalScore = data.score || 0;
    this.finalDistance = data.distance || 0;
  }

  create() {
    this.add.rectangle(GW / 2, GH / 2, GW, GH, 0xB0D4E3);
    this.add.rectangle(GW / 2, GH - 40, GW, 80, 0x2d5016);

    // Results panel
    this.add.rectangle(GW / 2, GH / 2 - 40, 500, 280, 0x000000, 0.85).setStrokeStyle(2, 0xFFD700);

    this.add.text(GW / 2, GH / 2 - 140, 'GAME OVER', {
      fontFamily: "'Georgia', serif", fontSize: 44, fontStyle: 'bold', color: '#FF6B6B'
    }).setOrigin(0.5);

    this.add.text(GW / 2, GH / 2 - 80, 'Score: ' + this.finalScore, {
      fontFamily: "'Georgia', serif", fontSize: 28, fontStyle: 'bold', color: '#FFD700'
    }).setOrigin(0.5);

    this.add.text(GW / 2, GH / 2 - 45, 'Distance: ' + this.finalDistance + 'm', {
      fontFamily: "'Georgia', serif", fontSize: 22, color: '#FFFFFF'
    }).setOrigin(0.5);

    // Initials entry
    this.add.text(GW / 2, GH / 2 + 10, 'Enter Your Initials:', {
      fontFamily: "'Georgia', serif", fontSize: 18, color: '#FFFFFF'
    }).setOrigin(0.5);

    this.initials = '';
    this.initialsText = this.add.text(GW / 2, GH / 2 + 55, '_ _ _', {
      fontFamily: "'Georgia', serif", fontSize: 40, fontStyle: 'bold', color: '#FFD700'
    }).setOrigin(0.5);

    this.add.text(GW / 2, GH / 2 + 100, 'Type 3 letters, then ENTER', {
      fontFamily: "'Georgia', serif", fontSize: 14, color: '#AAA'
    }).setOrigin(0.5);

    this.input.keyboard.on('keydown', (e) => {
      if (this.initials.length < 3 && /^[a-zA-Z]$/.test(e.key)) {
        this.initials += e.key.toUpperCase();
        this.updateInitials();
      } else if (e.key === 'Backspace') {
        this.initials = this.initials.slice(0, -1);
        this.updateInitials();
      } else if (e.key === 'Enter' && this.initials.length === 3) {
        this.submitScore();
      }
    });

    // Play again without saving
    this.add.rectangle(GW / 2, GH - 80, 300, 40, 0x000000, 0.7);
    const retryText = this.add.text(GW / 2, GH - 80, 'TAP or SPACE to play again', {
      fontFamily: "'Georgia', serif", fontSize: 14, color: '#88DDFF'
    }).setOrigin(0.5);
    this.tweens.add({ targets: retryText, alpha: 0.4, duration: 800, yoyo: true, repeat: -1 });

    this.input.on('pointerdown', () => this.scene.start('SelectScene'));
    this.input.keyboard.on('keydown-SPACE', () => this.scene.start('SelectScene'));
  }

  updateInitials() {
    const chars = this.initials.split('');
    while (chars.length < 3) chars.push('_');
    this.initialsText.setText(chars.join(' '));
  }

  submitScore() {
    const scores = JSON.parse(localStorage.getItem('hobbyHorseScores') || '[]');
    scores.push({ name: this.initials, score: this.finalScore, distance: this.finalDistance });
    scores.sort((a, b) => b.score - a.score);
    scores.splice(10);
    localStorage.setItem('hobbyHorseScores', JSON.stringify(scores));
    this.scene.start('HighScoresScene');
  }
}

// ============================================================
// HIGH SCORES SCENE
// ============================================================
class HighScoresScene extends Phaser.Scene {
  constructor() { super('HighScoresScene'); }

  create() {
    this.add.rectangle(GW / 2, GH / 2, GW, GH, 0xB0D4E3);
    this.add.rectangle(GW / 2, GH - 40, GW, 80, 0x2d5016);

    // Panel
    this.add.rectangle(GW / 2, GH / 2, 500, GH - 80, 0x000000, 0.85).setStrokeStyle(2, 0xFFD700);

    this.add.text(GW / 2, 40, 'HIGH SCORES', {
      fontFamily: "'Georgia', serif", fontSize: 36, fontStyle: 'bold', color: '#FFD700'
    }).setOrigin(0.5);

    const scores = JSON.parse(localStorage.getItem('hobbyHorseScores') || '[]');

    if (scores.length === 0) {
      this.add.text(GW / 2, GH / 2, 'No scores yet!\nPlay to set a record!', {
        fontFamily: "'Georgia', serif", fontSize: 22, color: '#FFF', align: 'center'
      }).setOrigin(0.5);
    } else {
      // Header
      this.add.text(200, 75, 'RANK', { fontFamily: "'Georgia', serif", fontSize: 14, color: '#AAA' }).setOrigin(0.5);
      this.add.text(300, 75, 'NAME', { fontFamily: "'Georgia', serif", fontSize: 14, color: '#AAA' }).setOrigin(0.5);
      this.add.text(480, 75, 'SCORE', { fontFamily: "'Georgia', serif", fontSize: 14, color: '#AAA' }).setOrigin(0.5);
      this.add.text(600, 75, 'DIST', { fontFamily: "'Georgia', serif", fontSize: 14, color: '#AAA' }).setOrigin(0.5);

      scores.slice(0, 10).forEach((s, i) => {
        const y = 105 + i * 38;
        const medalColors = ['#FFD700', '#C0C0C0', '#CD7F32'];
        const col = i < 3 ? medalColors[i] : '#FFFFFF';
        this.add.text(200, y, '#' + (i + 1), { fontFamily: "'Georgia', serif", fontSize: 20, fontStyle: 'bold', color: col }).setOrigin(0.5);
        this.add.text(300, y, s.name, { fontFamily: "'Georgia', serif", fontSize: 20, color: '#FFF' }).setOrigin(0.5);
        this.add.text(480, y, s.score.toString(), { fontFamily: "'Georgia', serif", fontSize: 20, fontStyle: 'bold', color: '#FFD700' }).setOrigin(0.5);
        this.add.text(600, y, s.distance + 'm', { fontFamily: "'Georgia', serif", fontSize: 18, color: '#AAA' }).setOrigin(0.5);
      });
    }

    this.add.rectangle(GW / 2, GH - 50, 300, 36, 0x000000, 0.7);
    this.add.text(GW / 2, GH - 50, 'TAP or SPACE to play again', {
      fontFamily: "'Georgia', serif", fontSize: 16, color: '#88DDFF'
    }).setOrigin(0.5);

    this.input.keyboard.on('keydown-SPACE', () => this.scene.start('SelectScene'));
    this.input.keyboard.on('keydown-RETURN', () => this.scene.start('SelectScene'));
    this.input.on('pointerdown', () => this.scene.start('SelectScene'));
  }
}

// ============================================================
// PHASER CONFIG
// ============================================================
const config = {
  type: Phaser.AUTO,
  width: GW,
  height: GH,
  parent: 'game-container',
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 600 }, debug: false }
  },
  scene: [BootScene, TitleScene, SelectScene, GameScene, GameOverScene, HighScoresScene],
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    expandParent: true
  }
};

const game = new Phaser.Game(config);
