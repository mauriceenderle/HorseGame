<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HorseGame - Majestic Arcade Adventure</title>
  <meta property="og:title" content="HorseGame - Majestic Arcade Adventure" />
  <meta property="og:description" content="A majestic horse blasting stars and rainbows through a retro pixel world. Can you make the top 10?" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://enderlecasa.com/HorseGame/" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #game-container { width: 100%; height: 100%; }
    canvas { display: block; image-rendering: auto; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
  <script>
// ============================================================
// HORSEGAME - Majestic Arcade Adventure
// ============================================================

// ---- ASSET GENERATION (all sprites created programmatically) ----

function generateTextures(scene) {
  // --- MLP-STYLE MAJESTIC HORSE (smooth, colorful, NOT pixel art) ---
  generateHorseTexture(scene);
  // --- PIXEL ART EVERYTHING ELSE ---
  generatePixelStar(scene);
  generatePixelRainbow(scene);
  generatePixelEnemies(scene);
  generatePixelPowerUps(scene);
  generatePixelGround(scene);
  generatePixelBackground(scene);
  generatePixelParticles(scene);
  generateMobileButtons(scene);
}

function generateHorseTexture(scene) {
  // Main horse body - MLP style, smooth curves, majestic
  const g = scene.make.graphics({ add: false });
  const w = 96, h = 80;

  // Body - smooth gradient purple/lavender
  g.fillStyle(0x9B59B6, 1);
  g.fillEllipse(48, 48, 56, 36);

  // Chest highlight
  g.fillStyle(0xBB8FCE, 1);
  g.fillEllipse(36, 44, 30, 24);

  // Neck
  g.fillStyle(0x9B59B6, 1);
  g.fillTriangle(24, 36, 16, 12, 38, 30);
  g.fillEllipse(26, 28, 20, 24);

  // Head - elegant shape
  g.fillStyle(0xAF7AC5, 1);
  g.fillEllipse(14, 14, 22, 18);

  // Snout
  g.fillStyle(0xD2B4DE, 1);
  g.fillEllipse(6, 18, 12, 10);

  // Eye - big, expressive MLP eye
  g.fillStyle(0xFFFFFF, 1);
  g.fillEllipse(14, 10, 12, 10);
  g.fillStyle(0x6C3483, 1);
  g.fillEllipse(15, 10, 8, 8);
  g.fillStyle(0x2C0E47, 1);
  g.fillEllipse(16, 10, 5, 6);
  // Eye shine
  g.fillStyle(0xFFFFFF, 1);
  g.fillCircle(13, 8, 2);

  // Nostril
  g.fillStyle(0x8E44AD, 1);
  g.fillCircle(4, 19, 1.5);

  // Ear
  g.fillStyle(0x9B59B6, 1);
  g.fillTriangle(10, 2, 18, 0, 16, 10);
  g.fillStyle(0xD7BDE2, 1);
  g.fillTriangle(12, 4, 17, 2, 16, 9);

  // Mane - flowing, rainbow-colored, majestic
  const maneColors = [0xFF6B9D, 0xFF85B3, 0xE74C8B, 0xC0392B, 0xFF69B4];
  for (let i = 0; i < 5; i++) {
    g.fillStyle(maneColors[i], 0.9);
    g.fillEllipse(22 + i * 5, 6 + i * 4, 14 - i, 10 + i * 2);
  }
  // Extra flowing mane behind
  g.fillStyle(0xFF69B4, 0.8);
  g.fillEllipse(40, 24, 16, 10);
  g.fillStyle(0xE74C8B, 0.7);
  g.fillEllipse(46, 28, 14, 8);

  // Legs - elegant, slender
  const legColor = 0x8E44AD;
  g.fillStyle(legColor, 1);
  // Front legs
  g.fillRoundedRect(28, 60, 7, 20, 3);
  g.fillRoundedRect(38, 58, 7, 22, 3);
  // Back legs
  g.fillRoundedRect(54, 58, 8, 22, 3);
  g.fillRoundedRect(64, 60, 7, 20, 3);

  // Hooves - golden
  g.fillStyle(0xF1C40F, 1);
  g.fillRoundedRect(27, 76, 9, 4, 2);
  g.fillRoundedRect(37, 76, 9, 4, 2);
  g.fillRoundedRect(53, 76, 10, 4, 2);
  g.fillRoundedRect(63, 76, 9, 4, 2);

  // Tail - majestic flowing rainbow tail
  g.fillStyle(0xFF69B4, 0.9);
  g.fillEllipse(80, 40, 20, 12);
  g.fillStyle(0xE74C8B, 0.8);
  g.fillEllipse(84, 44, 18, 10);
  g.fillStyle(0x9B59B6, 0.7);
  g.fillEllipse(86, 48, 16, 8);
  g.fillStyle(0x8E44AD, 0.6);
  g.fillEllipse(88, 52, 14, 8);

  // Horn (unicorn!) - golden sparkle
  g.fillStyle(0xF1C40F, 1);
  g.fillTriangle(8, 0, 12, -14, 16, 2);
  g.fillStyle(0xF9E79F, 1);
  g.fillTriangle(10, 0, 12, -12, 14, 1);

  // Sparkle on horn
  g.fillStyle(0xFFFFFF, 1);
  g.fillStar(12, -10, 4, 2, 1, 4);

  g.generateTexture('horse', w, h);
  g.destroy();

  // Running frame 2
  const g2 = scene.make.graphics({ add: false });
  // Same body
  g2.fillStyle(0x9B59B6, 1);
  g2.fillEllipse(48, 46, 56, 36);
  g2.fillStyle(0xBB8FCE, 1);
  g2.fillEllipse(36, 42, 30, 24);
  g2.fillStyle(0x9B59B6, 1);
  g2.fillTriangle(24, 34, 16, 10, 38, 28);
  g2.fillEllipse(26, 26, 20, 24);
  g2.fillStyle(0xAF7AC5, 1);
  g2.fillEllipse(14, 12, 22, 18);
  g2.fillStyle(0xD2B4DE, 1);
  g2.fillEllipse(6, 16, 12, 10);
  g2.fillStyle(0xFFFFFF, 1);
  g2.fillEllipse(14, 8, 12, 10);
  g2.fillStyle(0x6C3483, 1);
  g2.fillEllipse(15, 8, 8, 8);
  g2.fillStyle(0x2C0E47, 1);
  g2.fillEllipse(16, 8, 5, 6);
  g2.fillStyle(0xFFFFFF, 1);
  g2.fillCircle(13, 6, 2);
  g2.fillStyle(0x8E44AD, 1);
  g2.fillCircle(4, 17, 1.5);
  g2.fillStyle(0x9B59B6, 1);
  g2.fillTriangle(10, 0, 18, -2, 16, 8);
  g2.fillStyle(0xD7BDE2, 1);
  g2.fillTriangle(12, 2, 17, 0, 16, 7);
  for (let i = 0; i < 5; i++) {
    g2.fillStyle(maneColors[i], 0.9);
    g2.fillEllipse(24 + i * 6, 4 + i * 4, 14 - i, 10 + i * 2);
  }
  g2.fillStyle(0xFF69B4, 0.8);
  g2.fillEllipse(44, 22, 18, 10);
  // Legs in different position (running)
  g2.fillStyle(legColor, 1);
  g2.fillRoundedRect(26, 56, 7, 24, 3);  // front extended
  g2.fillRoundedRect(40, 62, 7, 18, 3);  // front tucked
  g2.fillRoundedRect(56, 62, 8, 18, 3);  // back tucked
  g2.fillRoundedRect(66, 56, 7, 24, 3);  // back extended
  g2.fillStyle(0xF1C40F, 1);
  g2.fillRoundedRect(25, 76, 9, 4, 2);
  g2.fillRoundedRect(39, 76, 9, 4, 2);
  g2.fillRoundedRect(55, 76, 10, 4, 2);
  g2.fillRoundedRect(65, 76, 9, 4, 2);
  // Tail more extended
  g2.fillStyle(0xFF69B4, 0.9);
  g2.fillEllipse(82, 36, 22, 12);
  g2.fillStyle(0xE74C8B, 0.8);
  g2.fillEllipse(88, 40, 20, 10);
  g2.fillStyle(0x9B59B6, 0.7);
  g2.fillEllipse(90, 44, 18, 8);
  // Horn
  g2.fillStyle(0xF1C40F, 1);
  g2.fillTriangle(8, -2, 12, -16, 16, 0);
  g2.fillStyle(0xF9E79F, 1);
  g2.fillTriangle(10, -2, 12, -14, 14, -1);

  g2.generateTexture('horse2', w, h);
  g2.destroy();
}

function generatePixelStar(scene) {
  const g = scene.make.graphics({ add: false });
  const s = 16;
  // Pixel art star - yellow with white center
  g.fillStyle(0xFFD700, 1);
  g.fillRect(6, 0, 4, 4);
  g.fillRect(0, 6, 16, 4);
  g.fillRect(2, 4, 12, 8);
  g.fillRect(4, 2, 8, 12);
  g.fillRect(6, 12, 4, 4);
  // White center pixel
  g.fillStyle(0xFFFFFF, 1);
  g.fillRect(6, 6, 4, 4);
  g.generateTexture('star', s, s);
  g.destroy();
}

function generatePixelRainbow(scene) {
  const g = scene.make.graphics({ add: false });
  // Rainbow projectile - horizontal beam, pixel art
  const colors = [0xFF0000, 0xFF7700, 0xFFFF00, 0x00FF00, 0x0088FF, 0x8800FF];
  for (let i = 0; i < 6; i++) {
    g.fillStyle(colors[i], 1);
    g.fillRect(0, i * 3, 24, 3);
  }
  g.generateTexture('rainbow', 24, 18);
  g.destroy();
}

function generatePixelEnemies(scene) {
  // Enemy type 1: Angry pixel bird
  let g = scene.make.graphics({ add: false });
  g.fillStyle(0xFF4444, 1);
  g.fillRect(4, 4, 8, 8);
  g.fillRect(2, 6, 12, 4);
  g.fillRect(0, 8, 2, 4);
  g.fillRect(14, 8, 2, 4);
  // Eyes
  g.fillStyle(0xFFFFFF, 1);
  g.fillRect(4, 4, 4, 4);
  g.fillRect(10, 4, 4, 4);
  g.fillStyle(0x000000, 1);
  g.fillRect(6, 4, 2, 4);
  g.fillRect(12, 4, 2, 4);
  // Beak
  g.fillStyle(0xFFA500, 1);
  g.fillRect(6, 10, 4, 2);
  g.generateTexture('enemy_bird', 16, 16);
  g.destroy();

  // Enemy type 2: Storm cloud
  g = scene.make.graphics({ add: false });
  g.fillStyle(0x555577, 1);
  g.fillRect(4, 4, 16, 10);
  g.fillRect(2, 6, 20, 6);
  g.fillRect(6, 2, 12, 2);
  g.fillRect(8, 0, 8, 2);
  // Dark underside
  g.fillStyle(0x333355, 1);
  g.fillRect(4, 10, 16, 4);
  // Lightning
  g.fillStyle(0xFFFF00, 1);
  g.fillRect(10, 14, 2, 4);
  g.fillRect(8, 18, 2, 2);
  g.fillRect(12, 16, 2, 2);
  g.generateTexture('enemy_cloud', 24, 22);
  g.destroy();

  // Enemy type 3: Flying hay bale
  g = scene.make.graphics({ add: false });
  g.fillStyle(0xDAA520, 1);
  g.fillRect(2, 2, 12, 12);
  g.fillStyle(0xB8860B, 1);
  g.fillRect(4, 4, 2, 8);
  g.fillRect(10, 4, 2, 8);
  g.fillRect(4, 4, 8, 2);
  g.fillRect(4, 10, 8, 2);
  // Pixel wings
  g.fillStyle(0xDDDDDD, 1);
  g.fillRect(0, 4, 2, 4);
  g.fillRect(14, 4, 2, 4);
  g.fillRect(0, 2, 2, 2);
  g.fillRect(14, 2, 2, 2);
  g.generateTexture('enemy_hay', 16, 16);
  g.destroy();
}

function generatePixelPowerUps(scene) {
  // Rainbow Blast power-up
  let g = scene.make.graphics({ add: false });
  g.fillStyle(0xFF69B4, 1);
  g.fillRect(2, 2, 12, 12);
  const rc = [0xFF0000, 0xFF7700, 0xFFFF00, 0x00FF00, 0x0088FF, 0x8800FF];
  for (let i = 0; i < 6; i++) {
    g.fillStyle(rc[i], 1);
    g.fillRect(3, 3 + i * 2, 10, 2);
  }
  g.fillStyle(0xFFFFFF, 1);
  g.fillRect(0, 0, 16, 2);
  g.fillRect(0, 14, 16, 2);
  g.fillRect(0, 0, 2, 16);
  g.fillRect(14, 0, 2, 16);
  g.generateTexture('powerup_blast', 16, 16);
  g.destroy();

  // Triple Star power-up
  g = scene.make.graphics({ add: false });
  g.fillStyle(0x222244, 1);
  g.fillRect(0, 0, 16, 16);
  g.fillStyle(0xFFD700, 1);
  g.fillRect(2, 6, 4, 4);
  g.fillRect(6, 2, 4, 4);
  g.fillRect(10, 6, 4, 4);
  g.fillStyle(0xFFFFFF, 1);
  g.fillRect(3, 7, 2, 2);
  g.fillRect(7, 3, 2, 2);
  g.fillRect(11, 7, 2, 2);
  g.generateTexture('powerup_triple', 16, 16);
  g.destroy();

  // Shield (horseshoe)
  g = scene.make.graphics({ add: false });
  g.fillStyle(0x44AAFF, 1);
  g.fillRect(0, 0, 16, 16);
  g.fillStyle(0xF1C40F, 1);
  g.fillRect(2, 2, 4, 12);
  g.fillRect(10, 2, 4, 12);
  g.fillRect(2, 2, 12, 4);
  g.fillStyle(0x44AAFF, 1);
  g.fillRect(6, 6, 4, 4);
  g.generateTexture('powerup_shield', 16, 16);
  g.destroy();

  // Speed boost
  g = scene.make.graphics({ add: false });
  g.fillStyle(0x00FF88, 1);
  g.fillRect(0, 0, 16, 16);
  g.fillStyle(0xFFFFFF, 1);
  g.fillRect(4, 2, 2, 12);
  g.fillRect(6, 4, 2, 2);
  g.fillRect(8, 6, 2, 2);
  g.fillRect(10, 4, 2, 2);
  g.fillRect(10, 2, 2, 12);
  g.generateTexture('powerup_speed', 16, 16);
  g.destroy();
}

function generatePixelGround(scene) {
  const g = scene.make.graphics({ add: false });
  // Pixel grass + dirt ground tile
  // Grass top
  g.fillStyle(0x44AA44, 1);
  g.fillRect(0, 0, 64, 8);
  g.fillStyle(0x55CC55, 1);
  g.fillRect(0, 0, 64, 4);
  // Random grass blades
  g.fillStyle(0x66DD66, 1);
  for (let x = 0; x < 64; x += 8) {
    g.fillRect(x + 2, 0, 2, 2);
  }
  // Dirt
  g.fillStyle(0x8B6914, 1);
  g.fillRect(0, 8, 64, 56);
  g.fillStyle(0x7A5C12, 1);
  // Dirt texture
  for (let y = 12; y < 64; y += 8) {
    for (let x = 0; x < 64; x += 12) {
      g.fillRect(x + ((y / 8) % 2) * 6, y, 4, 4);
    }
  }
  g.generateTexture('ground', 64, 64);
  g.destroy();
}

function generatePixelBackground(scene) {
  // Far background - pixel sky with hills
  const g = scene.make.graphics({ add: false });
  const w = 512, h = 400;

  // Sky gradient (pixelated feel)
  const skyColors = [0x1A0533, 0x2D1B69, 0x3D2B79, 0x4A3B99, 0x5B4BAA, 0x6B5BBB, 0x7B6BCC];
  for (let i = 0; i < skyColors.length; i++) {
    g.fillStyle(skyColors[i], 1);
    g.fillRect(0, i * (h / skyColors.length), w, h / skyColors.length + 1);
  }

  // Pixel stars in sky
  g.fillStyle(0xFFFFFF, 1);
  const starPositions = [
    [30, 20], [80, 50], [150, 30], [200, 70], [280, 25], [340, 60],
    [400, 40], [460, 55], [120, 80], [250, 45], [380, 15], [50, 95],
    [180, 15], [310, 90], [440, 75], [70, 60], [230, 85], [490, 30],
  ];
  starPositions.forEach(([x, y]) => {
    g.fillRect(x, y, 2, 2);
  });
  // Twinkle stars (bigger)
  g.fillStyle(0xFFFF88, 1);
  [
    [100, 40], [300, 20], [450, 50]
  ].forEach(([x, y]) => {
    g.fillRect(x, y, 2, 2);
    g.fillRect(x - 2, y, 6, 2);
    g.fillRect(x, y - 2, 2, 6);
  });

  // Far hills - dark pixel silhouette
  g.fillStyle(0x1A3322, 1);
  for (let x = 0; x < w; x += 2) {
    const hillH = Math.sin(x * 0.01) * 40 + Math.sin(x * 0.025) * 20 + 100;
    g.fillRect(x, h - hillH, 2, hillH);
  }

  // Near hills
  g.fillStyle(0x224433, 1);
  for (let x = 0; x < w; x += 2) {
    const hillH = Math.sin(x * 0.015 + 1) * 30 + Math.sin(x * 0.03) * 15 + 70;
    g.fillRect(x, h - hillH, 2, hillH);
  }

  // Pixel fence in mid-ground
  g.fillStyle(0x8B7355, 1);
  for (let x = 0; x < w; x += 40) {
    g.fillRect(x, h - 80, 4, 30);
    g.fillRect(x, h - 78, 40, 4);
    g.fillRect(x, h - 64, 40, 4);
  }

  g.generateTexture('background', w, h);
  g.destroy();

  // Moon
  const gm = scene.make.graphics({ add: false });
  gm.fillStyle(0xFFF8DC, 1);
  gm.fillCircle(16, 16, 14);
  gm.fillStyle(0xEEE8CD, 1);
  gm.fillCircle(12, 12, 3);
  gm.fillCircle(20, 18, 2);
  gm.fillCircle(10, 20, 2);
  gm.generateTexture('moon', 32, 32);
  gm.destroy();
}

function generatePixelParticles(scene) {
  // Sparkle particle
  const g = scene.make.graphics({ add: false });
  g.fillStyle(0xFFFFFF, 1);
  g.fillRect(2, 0, 2, 6);
  g.fillRect(0, 2, 6, 2);
  g.generateTexture('sparkle', 6, 6);
  g.destroy();

  // Explosion pixel particle
  const g2 = scene.make.graphics({ add: false });
  g2.fillStyle(0xFF6600, 1);
  g2.fillRect(0, 0, 4, 4);
  g2.generateTexture('pixel_particle', 4, 4);
  g2.destroy();

  // Rainbow trail particle
  const g3 = scene.make.graphics({ add: false });
  g3.fillStyle(0xFF69B4, 1);
  g3.fillRect(0, 0, 3, 3);
  g3.generateTexture('trail_particle', 3, 3);
  g3.destroy();
}

function generateMobileButtons(scene) {
  // D-pad buttons
  const size = 48;
  ['btn_left', 'btn_right', 'btn_up'].forEach((name) => {
    const g = scene.make.graphics({ add: false });
    g.fillStyle(0xFFFFFF, 0.3);
    g.fillRoundedRect(0, 0, size, size, 8);
    g.lineStyle(2, 0xFFFFFF, 0.6);
    g.strokeRoundedRect(0, 0, size, size, 8);
    // Arrow
    g.fillStyle(0xFFFFFF, 0.8);
    if (name === 'btn_left') {
      g.fillTriangle(14, 24, 34, 12, 34, 36);
    } else if (name === 'btn_right') {
      g.fillTriangle(34, 24, 14, 12, 14, 36);
    } else {
      g.fillTriangle(24, 12, 12, 34, 36, 34);
    }
    g.generateTexture(name, size, size);
    g.destroy();
  });

  // Shoot button
  const g = scene.make.graphics({ add: false });
  g.fillStyle(0xFF69B4, 0.4);
  g.fillCircle(32, 32, 30);
  g.lineStyle(2, 0xFF69B4, 0.7);
  g.strokeCircle(32, 32, 30);
  // Star icon
  g.fillStyle(0xFFD700, 0.9);
  g.fillStar(32, 32, 12, 6, 5);
  g.generateTexture('btn_shoot', 64, 64);
  g.destroy();
}


// ============================================================
// BOOT SCENE
// ============================================================
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }

  create() {
    generateTextures(this);
    this.scene.start('Title');
  }
}

// ============================================================
// TITLE SCENE
// ============================================================
class TitleScene extends Phaser.Scene {
  constructor() { super('Title'); }

  create() {
    const { width, height } = this.scale;

    // Background
    this.add.tileSprite(0, 0, width, height, 'background').setOrigin(0).setScrollFactor(0);

    // Moon
    this.add.image(width * 0.8, height * 0.15, 'moon').setScale(2);

    // Ground
    for (let x = 0; x < width + 64; x += 64) {
      this.add.image(x, height - 32, 'ground').setOrigin(0, 0).setScale(1).setY(height - 64);
    }

    // Title text - retro pixel style
    const titleStyle = {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.08, 64) + 'px',
      color: '#FFD700',
      stroke: '#8B4513',
      strokeThickness: 6,
      shadow: { offsetX: 3, offsetY: 3, color: '#000', blur: 0, stroke: true, fill: true }
    };
    this.add.text(width / 2, height * 0.18, 'HORSE GAME', titleStyle).setOrigin(0.5);

    // Subtitle
    const subStyle = {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.03, 20) + 'px',
      color: '#FF69B4',
    };
    this.add.text(width / 2, height * 0.28, '~ Majestic Arcade Adventure ~', subStyle).setOrigin(0.5);

    // Horse preview
    const horse = this.add.image(width / 2, height * 0.52, 'horse').setScale(2.5);
    this.tweens.add({
      targets: horse,
      y: height * 0.52 - 10,
      duration: 1200,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut'
    });

    // Sparkle around horse
    this.time.addEvent({
      delay: 300,
      callback: () => {
        const sx = horse.x + Phaser.Math.Between(-60, 60);
        const sy = horse.y + Phaser.Math.Between(-40, 40);
        const sparkle = this.add.image(sx, sy, 'sparkle').setScale(Phaser.Math.FloatBetween(0.5, 1.5));
        sparkle.setTint(Phaser.Utils.Array.GetRandom([0xFFD700, 0xFF69B4, 0xFFFFFF, 0x9B59B6]));
        this.tweens.add({
          targets: sparkle,
          alpha: 0,
          scale: 0,
          duration: 600,
          onComplete: () => sparkle.destroy()
        });
      },
      loop: true
    });

    // Start prompt
    const startText = this.add.text(width / 2, height * 0.78, 'PRESS SPACE OR TAP TO START', {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.035, 22) + 'px',
      color: '#FFFFFF',
    }).setOrigin(0.5);

    this.tweens.add({
      targets: startText,
      alpha: 0.3,
      duration: 600,
      yoyo: true,
      repeat: -1
    });

    // High scores button
    const hsText = this.add.text(width / 2, height * 0.88, 'HIGH SCORES', {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.03, 18) + 'px',
      color: '#FFD700',
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    hsText.on('pointerover', () => hsText.setColor('#FFFFFF'));
    hsText.on('pointerout', () => hsText.setColor('#FFD700'));
    hsText.on('pointerdown', () => this.scene.start('HighScores'));

    // Input
    this.input.keyboard.on('keydown-SPACE', () => this.scene.start('Game'));
    this.input.on('pointerdown', (pointer) => {
      // Ignore if clicking high scores
      if (pointer.y < height * 0.85) {
        this.scene.start('Game');
      }
    });

    // Controls info
    const controlsY = height * 0.93;
    const ctrlStyle = {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.02, 14) + 'px',
      color: '#888888',
    };
    this.add.text(width / 2, controlsY, 'ARROWS: Move/Jump  |  SPACE: Shoot', ctrlStyle).setOrigin(0.5);
  }
}

// ============================================================
// GAME SCENE - Main gameplay
// ============================================================
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    const { width, height } = this.scale;
    this.gameWidth = width;
    this.gameHeight = height;

    // State
    this.score = 0;
    this.distance = 0;
    this.gameSpeed = 3;
    this.isGameOver = false;
    this.hasShield = false;
    this.tripleShot = false;
    this.tripleShotTimer = 0;
    this.speedBoost = false;
    this.speedBoostTimer = 0;
    this.lastShot = 0;
    this.shotCooldown = 250;
    this.difficulty = 1;
    this.isMobile = !this.sys.game.device.os.desktop;

    // Background layers
    this.bg = this.add.tileSprite(0, 0, width, height, 'background').setOrigin(0).setScrollFactor(0);
    this.moon = this.add.image(width * 0.85, height * 0.1, 'moon').setScale(2).setScrollFactor(0);

    // Ground
    this.groundGroup = this.physics.add.staticGroup();
    const groundY = height - 48;
    for (let x = -64; x < width + 128; x += 64) {
      this.groundGroup.create(x + 32, groundY + 32, 'ground');
    }
    this.groundTiles = this.add.tileSprite(0, groundY, width, 64, 'ground').setOrigin(0).setScrollFactor(0);

    // Physics world bounds
    this.physics.world.setBounds(0, 0, width, groundY);

    // Player horse
    this.player = this.physics.add.sprite(width * 0.15, groundY - 50, 'horse');
    this.player.setCollideWorldBounds(true);
    this.player.setBounce(0.1);
    this.player.setGravityY(600);
    this.player.body.setSize(60, 50);
    this.player.body.setOffset(16, 20);

    // Horse running animation timer
    this.horseFrame = 0;
    this.time.addEvent({
      delay: 200,
      callback: () => {
        if (!this.isGameOver) {
          this.horseFrame = 1 - this.horseFrame;
          this.player.setTexture(this.horseFrame === 0 ? 'horse' : 'horse2');
        }
      },
      loop: true
    });

    // Trail particles behind horse
    this.time.addEvent({
      delay: 80,
      callback: () => {
        if (!this.isGameOver && this.player.active) {
          const t = this.add.image(
            this.player.x + Phaser.Math.Between(20, 40),
            this.player.y + Phaser.Math.Between(-5, 15),
            'trail_particle'
          );
          t.setTint(Phaser.Utils.Array.GetRandom([0xFF69B4, 0x9B59B6, 0xFFD700, 0xFF85B3]));
          t.setAlpha(0.7);
          this.tweens.add({
            targets: t,
            x: t.x + 30,
            alpha: 0,
            scale: 0,
            duration: 400,
            onComplete: () => t.destroy()
          });
        }
      },
      loop: true
    });

    // Groups
    this.projectiles = this.physics.add.group({ allowGravity: false });
    this.enemies = this.physics.add.group({ allowGravity: false });
    this.powerups = this.physics.add.group({ allowGravity: false });

    // Collision
    this.physics.add.collider(this.player, this.groundGroup);
    this.physics.add.overlap(this.projectiles, this.enemies, this.hitEnemy, null, this);
    this.physics.add.overlap(this.player, this.enemies, this.playerHit, null, this);
    this.physics.add.overlap(this.player, this.powerups, this.collectPowerUp, null, this);

    // Enemy spawn timer
    this.enemyTimer = this.time.addEvent({
      delay: 1500,
      callback: this.spawnEnemy,
      callbackScope: this,
      loop: true
    });

    // Power-up spawn timer
    this.powerupTimer = this.time.addEvent({
      delay: 8000,
      callback: this.spawnPowerUp,
      callbackScope: this,
      loop: true
    });

    // Difficulty ramp
    this.time.addEvent({
      delay: 5000,
      callback: () => {
        if (!this.isGameOver) {
          this.difficulty += 0.15;
          this.gameSpeed = Math.min(3 + this.difficulty * 0.5, 8);
          // Spawn enemies faster
          const newDelay = Math.max(400, 1500 - this.difficulty * 100);
          this.enemyTimer.delay = newDelay;
        }
      },
      callbackScope: this,
      loop: true
    });

    // UI
    this.scoreText = this.add.text(16, 16, 'SCORE: 0', {
      fontFamily: 'Courier New, monospace',
      fontSize: '20px',
      color: '#FFD700',
      stroke: '#000',
      strokeThickness: 4,
    }).setScrollFactor(0).setDepth(100);

    this.distanceText = this.add.text(16, 42, 'DIST: 0m', {
      fontFamily: 'Courier New, monospace',
      fontSize: '16px',
      color: '#AAAAAA',
      stroke: '#000',
      strokeThickness: 3,
    }).setScrollFactor(0).setDepth(100);

    // Shield indicator
    this.shieldIndicator = this.add.text(width - 16, 16, '', {
      fontFamily: 'Courier New, monospace',
      fontSize: '16px',
      color: '#44AAFF',
      stroke: '#000',
      strokeThickness: 3,
    }).setOrigin(1, 0).setScrollFactor(0).setDepth(100);

    // Power-up indicator
    this.powerupIndicator = this.add.text(width - 16, 38, '', {
      fontFamily: 'Courier New, monospace',
      fontSize: '14px',
      color: '#FFD700',
      stroke: '#000',
      strokeThickness: 3,
    }).setOrigin(1, 0).setScrollFactor(0).setDepth(100);

    // Input
    this.cursors = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.wasd = this.input.keyboard.addKeys('W,A,S,D');

    // Mobile controls
    if (this.isMobile) {
      this.setupMobileControls();
    }

    // Touch shooting (anywhere right side of screen on mobile)
    this.mobileShoot = false;
    this.mobileLeft = false;
    this.mobileRight = false;
    this.mobileJump = false;
  }

  setupMobileControls() {
    const { width, height } = this.scale;
    const pad = 10;
    const btnSize = 48;
    const bottomY = height - pad - btnSize;

    // Left button
    const btnLeft = this.add.image(pad + btnSize / 2, bottomY - btnSize / 2, 'btn_left')
      .setScrollFactor(0).setDepth(200).setAlpha(0.7).setInteractive();
    // Right button
    const btnRight = this.add.image(pad + btnSize * 1.8, bottomY - btnSize / 2, 'btn_right')
      .setScrollFactor(0).setDepth(200).setAlpha(0.7).setInteractive();
    // Jump button
    const btnUp = this.add.image(pad + btnSize * 0.9, bottomY - btnSize * 1.7, 'btn_up')
      .setScrollFactor(0).setDepth(200).setAlpha(0.7).setInteractive();
    // Shoot button
    const btnShoot = this.add.image(width - pad - 32, bottomY - btnSize / 2, 'btn_shoot')
      .setScrollFactor(0).setDepth(200).setAlpha(0.7).setInteractive();

    btnLeft.on('pointerdown', () => this.mobileLeft = true);
    btnLeft.on('pointerup', () => this.mobileLeft = false);
    btnLeft.on('pointerout', () => this.mobileLeft = false);

    btnRight.on('pointerdown', () => this.mobileRight = true);
    btnRight.on('pointerup', () => this.mobileRight = false);
    btnRight.on('pointerout', () => this.mobileRight = false);

    btnUp.on('pointerdown', () => this.mobileJump = true);
    btnUp.on('pointerup', () => this.mobileJump = false);
    btnUp.on('pointerout', () => this.mobileJump = false);

    btnShoot.on('pointerdown', () => this.mobileShoot = true);
    btnShoot.on('pointerup', () => this.mobileShoot = false);
    btnShoot.on('pointerout', () => this.mobileShoot = false);
  }

  update(time, delta) {
    if (this.isGameOver) return;

    // Scroll background
    this.bg.tilePositionX += this.gameSpeed * 0.5;
    this.groundTiles.tilePositionX += this.gameSpeed;

    // Distance
    this.distance += this.gameSpeed * 0.1;
    this.distanceText.setText('DIST: ' + Math.floor(this.distance) + 'm');

    // Score from distance
    if (Math.floor(this.distance) % 10 === 0 && Math.floor(this.distance) > 0) {
      this.score += 1;
    }
    this.scoreText.setText('SCORE: ' + this.score);

    // Player movement
    const onGround = this.player.body.blocked.down || this.player.body.touching.down;
    const moveSpeed = this.speedBoost ? 280 : 200;

    if (this.cursors.left.isDown || this.wasd.A.isDown || this.mobileLeft) {
      this.player.setVelocityX(-moveSpeed);
      this.player.setFlipX(true);
    } else if (this.cursors.right.isDown || this.wasd.D.isDown || this.mobileRight) {
      this.player.setVelocityX(moveSpeed);
      this.player.setFlipX(false);
    } else {
      this.player.setVelocityX(0);
    }

    // Jump
    if ((this.cursors.up.isDown || this.wasd.W.isDown || this.mobileJump) && onGround) {
      this.player.setVelocityY(-450);
    }

    // Keep player in bounds
    if (this.player.x < 30) this.player.x = 30;
    if (this.player.x > this.gameWidth - 30) this.player.x = this.gameWidth - 30;

    // Shooting
    if ((this.spaceKey.isDown || this.mobileShoot) && time > this.lastShot + this.shotCooldown) {
      this.shoot(time);
    }

    // Move enemies left
    this.enemies.children.each((enemy) => {
      if (enemy.active) {
        enemy.x -= this.gameSpeed;
        // Sine wave movement for some enemies
        if (enemy.getData('type') === 'bird') {
          enemy.y += Math.sin(time * 0.005 + enemy.getData('offset')) * 1.5;
        }
        if (enemy.x < -30) enemy.destroy();
      }
    });

    // Move power-ups left
    this.powerups.children.each((pu) => {
      if (pu.active) {
        pu.x -= this.gameSpeed;
        pu.y += Math.sin(time * 0.004) * 0.8;
        if (pu.x < -30) pu.destroy();
      }
    });

    // Move projectiles
    this.projectiles.children.each((proj) => {
      if (proj.active && (proj.x > this.gameWidth + 30 || proj.x < -30 || proj.y < -30)) {
        proj.destroy();
      }
    });

    // Timer-based power-ups
    if (this.tripleShot && time > this.tripleShotTimer) {
      this.tripleShot = false;
      this.powerupIndicator.setText('');
    }
    if (this.speedBoost && time > this.speedBoostTimer) {
      this.speedBoost = false;
      this.powerupIndicator.setText('');
    }

    // Shield indicator
    this.shieldIndicator.setText(this.hasShield ? 'SHIELD' : '');
    if (this.hasShield) {
      // Shield glow effect on horse
      this.player.setTint(0x44AAFF);
    } else {
      this.player.clearTint();
    }
  }

  shoot(time) {
    this.lastShot = time;
    const x = this.player.x - 20;
    const y = this.player.y;

    // Alternate between stars and rainbows
    const useRainbow = Math.random() > 0.5;

    if (this.tripleShot) {
      // Triple shot - three projectiles
      [-120, 0, 120].forEach((angle) => {
        this.createProjectile(x, y, angle, useRainbow);
      });
    } else {
      this.createProjectile(x, y, 0, useRainbow);
    }
  }

  createProjectile(x, y, angleOffset, isRainbow) {
    const texKey = isRainbow ? 'rainbow' : 'star';
    const proj = this.projectiles.create(x, y, texKey);
    proj.setScale(isRainbow ? 1.5 : 2);

    const baseAngle = -90 + angleOffset * 0.3; // Mostly upward-left
    const speed = 400;

    // Shoot forward (left, since horse faces left toward enemies)
    // Actually enemies come from right, horse faces right - shoot left? No.
    // Horse is on the left side, enemies come from right. Shoot RIGHT.
    const vx = Math.cos(Phaser.Math.DegToRad(angleOffset)) * speed + 200;
    const vy = Math.sin(Phaser.Math.DegToRad(angleOffset - 20)) * speed * 0.3;

    proj.setVelocity(vx, vy + (angleOffset !== 0 ? angleOffset * 1.5 : 0));
    proj.body.setAllowGravity(false);

    // Sparkle trail
    if (isRainbow) {
      proj.setData('isRainbow', true);
    }

    // Auto-destroy after 2 seconds
    this.time.delayedCall(2000, () => {
      if (proj.active) proj.destroy();
    });
  }

  spawnEnemy() {
    if (this.isGameOver) return;

    const { width, height } = this.scale;
    const groundY = height - 48;
    const types = ['bird', 'cloud', 'hay'];
    const type = Phaser.Utils.Array.GetRandom(types);

    let enemy;
    const x = width + 30;

    switch (type) {
      case 'bird':
        enemy = this.enemies.create(x, Phaser.Math.Between(60, groundY - 100), 'enemy_bird');
        enemy.setScale(2);
        enemy.setData('type', 'bird');
        enemy.setData('offset', Math.random() * 1000);
        enemy.setData('hp', 1);
        break;
      case 'cloud':
        enemy = this.enemies.create(x, Phaser.Math.Between(40, groundY - 140), 'enemy_cloud');
        enemy.setScale(2);
        enemy.setData('type', 'cloud');
        enemy.setData('hp', 2);
        break;
      case 'hay':
        enemy = this.enemies.create(x, groundY - 30, 'enemy_hay');
        enemy.setScale(2);
        enemy.setData('type', 'hay');
        enemy.setData('hp', 1);
        // Hay rolls along ground
        enemy.setVelocityX(-50 * this.difficulty);
        break;
    }

    if (enemy) {
      enemy.body.setAllowGravity(false);
      // Spawn more enemies at higher difficulty
      if (this.difficulty > 3 && Math.random() > 0.6) {
        this.time.delayedCall(300, () => this.spawnEnemy());
      }
    }
  }

  spawnPowerUp() {
    if (this.isGameOver) return;

    const { width, height } = this.scale;
    const groundY = height - 48;
    const types = ['powerup_blast', 'powerup_triple', 'powerup_shield', 'powerup_speed'];
    const type = Phaser.Utils.Array.GetRandom(types);

    const pu = this.powerups.create(
      width + 20,
      Phaser.Math.Between(80, groundY - 80),
      type
    );
    pu.setScale(2);
    pu.setData('type', type);
    pu.body.setAllowGravity(false);
  }

  hitEnemy(projectile, enemy) {
    const hp = enemy.getData('hp') - 1;
    enemy.setData('hp', hp);

    // Hit flash
    enemy.setTint(0xFFFFFF);
    this.time.delayedCall(50, () => {
      if (enemy.active) enemy.clearTint();
    });

    projectile.destroy();

    if (hp <= 0) {
      // Explosion effect
      for (let i = 0; i < 6; i++) {
        const p = this.add.image(enemy.x, enemy.y, 'pixel_particle');
        p.setTint(Phaser.Utils.Array.GetRandom([0xFF4444, 0xFF8800, 0xFFFF00, 0xFFFFFF]));
        p.setScale(Phaser.Math.FloatBetween(1, 3));
        this.tweens.add({
          targets: p,
          x: p.x + Phaser.Math.Between(-40, 40),
          y: p.y + Phaser.Math.Between(-40, 40),
          alpha: 0,
          scale: 0,
          duration: 400,
          onComplete: () => p.destroy()
        });
      }

      // Score
      const type = enemy.getData('type');
      const points = type === 'cloud' ? 200 : 100;
      this.score += points;

      // Floating score text
      const ft = this.add.text(enemy.x, enemy.y, '+' + points, {
        fontFamily: 'Courier New, monospace',
        fontSize: '18px',
        color: '#FFD700',
        stroke: '#000',
        strokeThickness: 3,
      });
      this.tweens.add({
        targets: ft,
        y: ft.y - 40,
        alpha: 0,
        duration: 800,
        onComplete: () => ft.destroy()
      });

      enemy.destroy();
    }
  }

  playerHit(player, enemy) {
    if (this.isGameOver) return;

    if (this.hasShield) {
      this.hasShield = false;
      enemy.destroy();
      // Shield break effect
      for (let i = 0; i < 8; i++) {
        const p = this.add.image(player.x, player.y, 'sparkle');
        p.setTint(0x44AAFF);
        this.tweens.add({
          targets: p,
          x: p.x + Phaser.Math.Between(-50, 50),
          y: p.y + Phaser.Math.Between(-50, 50),
          alpha: 0,
          duration: 500,
          onComplete: () => p.destroy()
        });
      }
      return;
    }

    this.gameOver();
  }

  collectPowerUp(player, powerup) {
    const type = powerup.getData('type');

    // Collection effect
    for (let i = 0; i < 5; i++) {
      const s = this.add.image(powerup.x, powerup.y, 'sparkle');
      s.setTint(0xFFD700);
      s.setScale(Phaser.Math.FloatBetween(1, 2));
      this.tweens.add({
        targets: s,
        x: s.x + Phaser.Math.Between(-30, 30),
        y: s.y + Phaser.Math.Between(-30, 30),
        alpha: 0,
        scale: 0,
        duration: 400,
        onComplete: () => s.destroy()
      });
    }

    switch (type) {
      case 'powerup_blast':
        // Clear all enemies on screen
        this.enemies.children.each((e) => {
          if (e.active) {
            this.score += 50;
            // Rainbow blast visual
            for (let i = 0; i < 4; i++) {
              const p = this.add.image(e.x, e.y, 'pixel_particle');
              p.setTint(Phaser.Utils.Array.GetRandom([0xFF0000, 0xFF7700, 0xFFFF00, 0x00FF00, 0x0088FF, 0x8800FF]));
              p.setScale(2);
              this.tweens.add({
                targets: p,
                x: p.x + Phaser.Math.Between(-30, 30),
                y: p.y + Phaser.Math.Between(-30, 30),
                alpha: 0,
                duration: 300,
                onComplete: () => p.destroy()
              });
            }
            e.destroy();
          }
        });
        // Flash screen with rainbow
        this.cameras.main.flash(300, 255, 100, 200);
        this.showPowerUpText('RAINBOW BLAST!');
        break;

      case 'powerup_triple':
        this.tripleShot = true;
        this.tripleShotTimer = this.time.now + 8000;
        this.powerupIndicator.setText('TRIPLE STAR');
        this.showPowerUpText('TRIPLE STAR!');
        break;

      case 'powerup_shield':
        this.hasShield = true;
        this.showPowerUpText('SHIELD UP!');
        break;

      case 'powerup_speed':
        this.speedBoost = true;
        this.speedBoostTimer = this.time.now + 6000;
        this.powerupIndicator.setText('SPEED BOOST');
        this.showPowerUpText('SPEED BOOST!');
        break;
    }

    powerup.destroy();
  }

  showPowerUpText(text) {
    const { width, height } = this.scale;
    const t = this.add.text(width / 2, height * 0.35, text, {
      fontFamily: 'Courier New, monospace',
      fontSize: '28px',
      color: '#FFD700',
      stroke: '#000',
      strokeThickness: 5,
    }).setOrigin(0.5).setDepth(150);

    this.tweens.add({
      targets: t,
      y: t.y - 50,
      alpha: 0,
      scale: 1.5,
      duration: 1200,
      onComplete: () => t.destroy()
    });
  }

  gameOver() {
    this.isGameOver = true;
    this.physics.pause();

    // Death effect
    this.player.setTint(0xFF0000);
    this.cameras.main.shake(300, 0.02);

    // Explosion around player
    for (let i = 0; i < 12; i++) {
      const p = this.add.image(this.player.x, this.player.y, 'pixel_particle');
      p.setTint(Phaser.Utils.Array.GetRandom([0xFF0000, 0xFF4400, 0xFFFF00]));
      p.setScale(Phaser.Math.FloatBetween(1, 4));
      this.tweens.add({
        targets: p,
        x: p.x + Phaser.Math.Between(-80, 80),
        y: p.y + Phaser.Math.Between(-80, 80),
        alpha: 0,
        duration: 600,
      });
    }

    // Bonus score for distance
    this.score += Math.floor(this.distance);

    // Transition to game over
    this.time.delayedCall(1000, () => {
      this.scene.start('GameOver', { score: this.score });
    });
  }
}

// ============================================================
// GAME OVER SCENE - Arcade initial entry
// ============================================================
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOver'); }

  init(data) {
    this.finalScore = data.score || 0;
  }

  create() {
    const { width, height } = this.scale;

    this.add.tileSprite(0, 0, width, height, 'background').setOrigin(0);

    // GAME OVER text
    const goStyle = {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.1, 72) + 'px',
      color: '#FF4444',
      stroke: '#000',
      strokeThickness: 6,
    };
    this.add.text(width / 2, height * 0.12, 'GAME OVER', goStyle).setOrigin(0.5);

    // Score display with roll-up animation
    this.displayScore = 0;
    const scoreStyle = {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.06, 42) + 'px',
      color: '#FFD700',
      stroke: '#000',
      strokeThickness: 4,
    };
    this.scoreDisplay = this.add.text(width / 2, height * 0.24, 'SCORE: 0', scoreStyle).setOrigin(0.5);

    // Roll up the score
    this.tweens.addCounter({
      from: 0,
      to: this.finalScore,
      duration: 1500,
      ease: 'Power2',
      onUpdate: (tween) => {
        this.displayScore = Math.floor(tween.getValue());
        this.scoreDisplay.setText('SCORE: ' + this.displayScore);
      }
    });

    // Check if high score (for now always show initial entry)
    // Initial entry system
    this.initials = ['A', 'A', 'A'];
    this.currentPos = 0;
    this.setupInitialEntry(width, height);
  }

  setupInitialEntry(width, height) {
    const isHighScore = this.checkHighScore(this.finalScore);

    if (isHighScore) {
      this.add.text(width / 2, height * 0.35, 'NEW HIGH SCORE!', {
        fontFamily: 'Courier New, monospace',
        fontSize: Math.min(width * 0.04, 28) + 'px',
        color: '#FF69B4',
        stroke: '#000',
        strokeThickness: 3,
      }).setOrigin(0.5);
    }

    this.add.text(width / 2, height * 0.42, 'ENTER YOUR INITIALS', {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.035, 24) + 'px',
      color: '#FFFFFF',
      stroke: '#000',
      strokeThickness: 3,
    }).setOrigin(0.5);

    // Three letter slots
    const letterSize = Math.min(width * 0.08, 52);
    const spacing = letterSize * 1.8;
    const startX = width / 2 - spacing;
    const letterY = height * 0.52;

    this.letterTexts = [];
    this.letterBgs = [];

    for (let i = 0; i < 3; i++) {
      const x = startX + i * spacing;

      // Background box
      const bg = this.add.rectangle(x, letterY, letterSize, letterSize * 1.2, 0x222244, 0.8);
      bg.setStrokeStyle(2, i === 0 ? 0xFFD700 : 0x555577);
      this.letterBgs.push(bg);

      // Letter
      const lt = this.add.text(x, letterY, this.initials[i], {
        fontFamily: 'Courier New, monospace',
        fontSize: letterSize * 0.8 + 'px',
        color: '#FFD700',
        stroke: '#000',
        strokeThickness: 3,
      }).setOrigin(0.5);
      this.letterTexts.push(lt);
    }

    // Up/Down arrows for current position
    this.upArrow = this.add.text(startX, letterY - letterSize * 0.9, '▲', {
      fontSize: '24px', color: '#FFD700'
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    this.downArrow = this.add.text(startX, letterY + letterSize * 0.9, '▼', {
      fontSize: '24px', color: '#FFD700'
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    this.upArrow.on('pointerdown', () => this.changeInitial(1));
    this.downArrow.on('pointerdown', () => this.changeInitial(-1));

    // Blink current selection
    this.tweens.add({
      targets: this.letterTexts[0],
      alpha: 0.3,
      duration: 400,
      yoyo: true,
      repeat: -1
    });

    // Submit button
    const submitBtn = this.add.text(width / 2, height * 0.68, '[ SUBMIT ]', {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.04, 28) + 'px',
      color: '#00FF88',
      stroke: '#000',
      strokeThickness: 4,
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    submitBtn.on('pointerover', () => submitBtn.setColor('#FFFFFF'));
    submitBtn.on('pointerout', () => submitBtn.setColor('#00FF88'));
    submitBtn.on('pointerdown', () => this.submitScore());

    // Play Again
    const playAgain = this.add.text(width / 2, height * 0.78, 'PLAY AGAIN', {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.035, 22) + 'px',
      color: '#AAAAAA',
      stroke: '#000',
      strokeThickness: 3,
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    playAgain.on('pointerover', () => playAgain.setColor('#FFFFFF'));
    playAgain.on('pointerout', () => playAgain.setColor('#AAAAAA'));
    playAgain.on('pointerdown', () => this.scene.start('Game'));

    // Back to Title
    const titleBtn = this.add.text(width / 2, height * 0.86, 'TITLE SCREEN', {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.03, 18) + 'px',
      color: '#888888',
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    titleBtn.on('pointerdown', () => this.scene.start('Title'));

    // Keyboard input
    this.input.keyboard.on('keydown-UP', () => this.changeInitial(1));
    this.input.keyboard.on('keydown-DOWN', () => this.changeInitial(-1));
    this.input.keyboard.on('keydown-LEFT', () => this.moveCursor(-1));
    this.input.keyboard.on('keydown-RIGHT', () => this.moveCursor(1));
    this.input.keyboard.on('keydown-ENTER', () => this.submitScore());

    // Also allow typing letters directly
    this.input.keyboard.on('keydown', (event) => {
      if (event.keyCode >= 65 && event.keyCode <= 90) {
        this.initials[this.currentPos] = String.fromCharCode(event.keyCode);
        this.letterTexts[this.currentPos].setText(this.initials[this.currentPos]);
        this.moveCursor(1);
      }
    });
  }

  changeInitial(dir) {
    const code = this.initials[this.currentPos].charCodeAt(0) + dir;
    if (code > 90) this.initials[this.currentPos] = 'A';
    else if (code < 65) this.initials[this.currentPos] = 'Z';
    else this.initials[this.currentPos] = String.fromCharCode(code);

    this.letterTexts[this.currentPos].setText(this.initials[this.currentPos]);
  }

  moveCursor(dir) {
    // Stop blinking on old
    this.tweens.killTweensOf(this.letterTexts[this.currentPos]);
    this.letterTexts[this.currentPos].setAlpha(1);
    this.letterBgs[this.currentPos].setStrokeStyle(2, 0x555577);

    this.currentPos = Phaser.Math.Clamp(this.currentPos + dir, 0, 2);

    // Highlight new
    this.letterBgs[this.currentPos].setStrokeStyle(2, 0xFFD700);
    this.tweens.add({
      targets: this.letterTexts[this.currentPos],
      alpha: 0.3,
      duration: 400,
      yoyo: true,
      repeat: -1
    });

    // Move arrows
    const letterSize = Math.min(this.scale.width * 0.08, 52);
    const spacing = letterSize * 1.8;
    const startX = this.scale.width / 2 - spacing;
    const x = startX + this.currentPos * spacing;
    this.upArrow.setX(x);
    this.downArrow.setX(x);
  }

  checkHighScore(score) {
    const scores = this.getScores();
    return scores.length < 10 || score > scores[scores.length - 1].score;
  }

  getScores() {
    try {
      const raw = localStorage.getItem('horseGameScores');
      return raw ? JSON.parse(raw) : [];
    } catch {
      return [];
    }
  }

  submitScore() {
    const name = this.initials.join('');
    const scores = this.getScores();
    scores.push({ name, score: this.finalScore, date: new Date().toISOString() });
    scores.sort((a, b) => b.score - a.score);
    const top10 = scores.slice(0, 10);

    try {
      localStorage.setItem('horseGameScores', JSON.stringify(top10));
    } catch (e) {
      // localStorage might not be available
    }

    this.scene.start('HighScores', { highlight: name });
  }
}

// ============================================================
// HIGH SCORES SCENE
// ============================================================
class HighScoresScene extends Phaser.Scene {
  constructor() { super('HighScores'); }

  init(data) {
    this.highlightName = data?.highlight || null;
  }

  create() {
    const { width, height } = this.scale;

    this.add.tileSprite(0, 0, width, height, 'background').setOrigin(0);

    // Title
    this.add.text(width / 2, height * 0.06, 'HIGH SCORES', {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.07, 48) + 'px',
      color: '#FFD700',
      stroke: '#000',
      strokeThickness: 5,
    }).setOrigin(0.5);

    // Get scores
    let scores = [];
    try {
      const raw = localStorage.getItem('horseGameScores');
      scores = raw ? JSON.parse(raw) : [];
    } catch {
      scores = [];
    }

    // Display scores
    const startY = height * 0.16;
    const rowH = Math.min(height * 0.065, 40);
    const fontSize = Math.min(width * 0.035, 22) + 'px';

    // Header
    this.add.text(width * 0.15, startY, 'RANK', {
      fontFamily: 'Courier New, monospace', fontSize, color: '#888888'
    });
    this.add.text(width * 0.35, startY, 'NAME', {
      fontFamily: 'Courier New, monospace', fontSize, color: '#888888'
    });
    this.add.text(width * 0.65, startY, 'SCORE', {
      fontFamily: 'Courier New, monospace', fontSize, color: '#888888'
    });

    // Score rows
    for (let i = 0; i < 10; i++) {
      const y = startY + (i + 1) * rowH;
      const rank = (i + 1).toString().padStart(2, ' ');
      const isNew = scores[i] && this.highlightName && scores[i].name === this.highlightName;
      const color = isNew ? '#FF69B4' : (i < 3 ? '#FFD700' : '#CCCCCC');
      const style = { fontFamily: 'Courier New, monospace', fontSize, color, stroke: '#000', strokeThickness: 2 };

      this.add.text(width * 0.15, y, rank + '.', style);

      if (scores[i]) {
        this.add.text(width * 0.35, y, scores[i].name, style);
        this.add.text(width * 0.65, y, scores[i].score.toString().padStart(8, ' '), style);
      } else {
        this.add.text(width * 0.35, y, '---', { ...style, color: '#444444' });
        this.add.text(width * 0.65, y, '--------', { ...style, color: '#444444' });
      }
    }

    // Buttons
    const btnY = height * 0.88;
    const playBtn = this.add.text(width * 0.3, btnY, 'PLAY', {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.04, 24) + 'px',
      color: '#00FF88',
      stroke: '#000',
      strokeThickness: 3,
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    playBtn.on('pointerover', () => playBtn.setColor('#FFFFFF'));
    playBtn.on('pointerout', () => playBtn.setColor('#00FF88'));
    playBtn.on('pointerdown', () => this.scene.start('Game'));

    const titleBtn = this.add.text(width * 0.7, btnY, 'TITLE', {
      fontFamily: 'Courier New, monospace',
      fontSize: Math.min(width * 0.04, 24) + 'px',
      color: '#FFD700',
      stroke: '#000',
      strokeThickness: 3,
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    titleBtn.on('pointerover', () => titleBtn.setColor('#FFFFFF'));
    titleBtn.on('pointerout', () => titleBtn.setColor('#FFD700'));
    titleBtn.on('pointerdown', () => this.scene.start('Title'));

    // Keyboard shortcuts
    this.input.keyboard.on('keydown-SPACE', () => this.scene.start('Game'));
    this.input.keyboard.on('keydown-ESC', () => this.scene.start('Title'));
  }
}
