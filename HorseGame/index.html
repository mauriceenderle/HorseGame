<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hobby Horse Championship</title>
  <meta property="og:title" content="Hobby Horse Championship" />
  <meta property="og:description" content="Jump, gallop, and race through show courses with your hobby horse!" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://enderlecasa.com/HorseGame/" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a3320;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #game-container { width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
  <script>
// ============================================================
// HOBBY HORSE CHAMPIONSHIP
// Phaser 3 side-scrolling game with 5 photorealistic hobby horses
// ============================================================

const GW = 900;
const GH = 550;
const GROUND_Y = GH - 80; // Top of the grass — the surface the player stands on

// Horse color schemes — richer palette for realism
const HORSE_COLORS = {
  chestnut: {
    name: 'Chestnut',
    body: '#9A5E2A', hi: '#C4894E', shadow: '#5C3415', dark: '#3A1E0A',
    mane: '#2A1508', maneHi: '#4A2810',
    marking: 'star', markColor: '#F5EDE0',
    dapple: false, earInner: '#D4A080'
  },
  blackBeauty: {
    name: 'Black Beauty',
    body: '#1C1C1C', hi: '#3A3A3A', shadow: '#0A0A0A', dark: '#000',
    mane: '#0A0A0A', maneHi: '#222',
    marking: 'snip', markColor: '#F5EDE0',
    dapple: false, earInner: '#C09080'
  },
  dappleGrey: {
    name: 'Dapple Grey',
    body: '#A8A8A8', hi: '#D0D0D0', shadow: '#707070', dark: '#555',
    mane: '#E8E8E8', maneHi: '#FFF',
    marking: 'none', markColor: '#F5EDE0',
    dapple: true, earInner: '#D0B0B0'
  },
  palomino: {
    name: 'Palomino',
    body: '#D4A76A', hi: '#EAC88E', shadow: '#A07838', dark: '#7A5520',
    mane: '#F5EDE0', maneHi: '#FFF',
    marking: 'blaze', markColor: '#F8F2EA',
    dapple: false, earInner: '#E0C0A0'
  },
  paint: {
    name: 'Paint',
    body: '#8B4513', hi: '#B06030', shadow: '#5C2E0E', dark: '#3A1A05',
    mane: '#2A1508', maneHi: '#4A2810',
    marking: 'tobiano', markColor: '#FFFAF5',
    dapple: false, earInner: '#D4A080'
  }
};

// ============================================================
// PHOTOREALISTIC HOBBY HORSE — high-detail Canvas 2D rendering
// ============================================================
function createHobbyHorseImage(cs) {
  const W = 160, H = 240;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = true;

  // Helper: hex to rgb
  function hexRgb(hex) {
    const n = parseInt(hex.replace('#',''), 16);
    return [(n>>16)&255, (n>>8)&255, n&255];
  }
  function rgba(hex, a) {
    const [r,g,b] = hexRgb(hex);
    return `rgba(${r},${g},${b},${a})`;
  }

  // === WOODEN STICK with grain, knots, and rounded end ===
  ctx.save();
  const sx = 74, sy = 100, sw = 12, sh = 140;
  // Main stick gradient
  const stickG = ctx.createLinearGradient(sx, sy, sx + sw, sy);
  stickG.addColorStop(0, '#A08050');
  stickG.addColorStop(0.2, '#D4B88C');
  stickG.addColorStop(0.5, '#E8D0A8');
  stickG.addColorStop(0.8, '#C4A06A');
  stickG.addColorStop(1, '#8A6838');
  ctx.fillStyle = stickG;
  // Rounded bottom
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(sx, sy + sh - 6);
  ctx.quadraticCurveTo(sx, sy + sh, sx + 3, sy + sh);
  ctx.lineTo(sx + sw - 3, sy + sh);
  ctx.quadraticCurveTo(sx + sw, sy + sh, sx + sw, sy + sh - 6);
  ctx.lineTo(sx + sw, sy);
  ctx.closePath();
  ctx.fill();
  // Wood grain lines
  ctx.strokeStyle = 'rgba(100, 70, 30, 0.12)';
  ctx.lineWidth = 0.6;
  for (let y = sy + 5; y < sy + sh; y += 4) {
    ctx.beginPath();
    ctx.moveTo(sx + 1, y + Math.sin(y * 0.1) * 1.5);
    ctx.lineTo(sx + sw - 1, y + Math.cos(y * 0.12) * 1.5 + 1);
    ctx.stroke();
  }
  // Wood knot
  ctx.fillStyle = 'rgba(110, 75, 30, 0.25)';
  ctx.beginPath();
  ctx.ellipse(sx + 6, sy + 60, 3, 4, 0.2, 0, Math.PI * 2);
  ctx.fill();
  // Stick highlight edge
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx + 3, sy + 2);
  ctx.lineTo(sx + 3, sy + sh - 4);
  ctx.stroke();
  ctx.restore();

  // === MOUNT COLLAR — where head meets stick ===
  const collarG = ctx.createLinearGradient(60, 92, 100, 92);
  collarG.addColorStop(0, '#5A3A20');
  collarG.addColorStop(0.5, '#8B6040');
  collarG.addColorStop(1, '#5A3A20');
  ctx.fillStyle = collarG;
  ctx.beginPath();
  ctx.ellipse(80, 96, 22, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  // Leather stitching on collar
  ctx.strokeStyle = '#3A2010';
  ctx.lineWidth = 0.8;
  ctx.setLineDash([2, 2]);
  ctx.beginPath();
  ctx.ellipse(80, 96, 20, 6, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // === DROP SHADOW under head ===
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.ellipse(82, 56, 42, 48, 0.08, 0, Math.PI * 2);
  ctx.fill();

  // === MAIN HEAD SHAPE — anatomically curved bezier horse head ===
  ctx.save();
  const headG = ctx.createRadialGradient(72, 38, 8, 78, 48, 48);
  headG.addColorStop(0, cs.hi);
  headG.addColorStop(0.35, cs.body);
  headG.addColorStop(0.7, cs.shadow);
  headG.addColorStop(1, cs.dark);
  ctx.fillStyle = headG;
  ctx.beginPath();
  // Start at top-left of forehead, trace clockwise
  ctx.moveTo(48, 22);
  // Forehead curve up to poll
  ctx.bezierCurveTo(42, 8, 62, -4, 80, 0);
  // Poll to right ear area
  ctx.bezierCurveTo(98, 4, 108, 14, 110, 30);
  // Right cheek
  ctx.bezierCurveTo(112, 45, 108, 60, 102, 72);
  // Right jaw curving to chin
  ctx.bezierCurveTo(96, 82, 88, 90, 80, 94);
  // Chin across to left jaw
  ctx.bezierCurveTo(70, 92, 58, 86, 52, 76);
  // Left cheek
  ctx.bezierCurveTo(44, 64, 40, 50, 40, 38);
  // Back up to forehead
  ctx.bezierCurveTo(41, 30, 44, 26, 48, 22);
  ctx.closePath();
  ctx.fill();

  // === DIMENSIONAL SHADING — multiple layers for 3D effect ===
  // Cheek highlight (left, catching light)
  const cheekHi = ctx.createRadialGradient(62, 40, 4, 65, 42, 22);
  cheekHi.addColorStop(0, rgba(cs.hi, 0.5));
  cheekHi.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = cheekHi;
  ctx.fill(); // fills same path

  // Under-jaw shadow
  const jawShadow = ctx.createRadialGradient(76, 85, 5, 76, 82, 25);
  jawShadow.addColorStop(0, rgba(cs.dark, 0.4));
  jawShadow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = jawShadow;
  ctx.fill();
  ctx.restore();

  // === MUZZLE — soft pink/tan area ===
  const muzzG = ctx.createRadialGradient(78, 82, 4, 78, 82, 18);
  muzzG.addColorStop(0, '#EAD4BE');
  muzzG.addColorStop(0.4, '#D8BCA0');
  muzzG.addColorStop(0.8, '#C4A080');
  muzzG.addColorStop(1, rgba(cs.body, 0.6));
  ctx.fillStyle = muzzG;
  ctx.beginPath();
  ctx.ellipse(78, 84, 20, 14, 0.05, 0, Math.PI * 2);
  ctx.fill();

  // Muzzle whisker bumps
  ctx.fillStyle = 'rgba(200,180,150,0.3)';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.ellipse(66 + i * 6, 80 + (i % 2) * 3, 1.2, 1.2, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // === NOSTRILS — deep, detailed ===
  // Left nostril
  const nosG1 = ctx.createRadialGradient(68, 82, 1, 68, 82, 5);
  nosG1.addColorStop(0, '#1A0A02');
  nosG1.addColorStop(0.6, '#3A1A08');
  nosG1.addColorStop(1, '#5A3020');
  ctx.fillStyle = nosG1;
  ctx.beginPath();
  ctx.ellipse(68, 82, 5, 3.5, -0.2, 0, Math.PI * 2);
  ctx.fill();
  // Nostril rim highlight
  ctx.strokeStyle = rgba(cs.hi, 0.3);
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.ellipse(68, 81, 5.5, 3.2, -0.2, Math.PI * 1.2, Math.PI * 1.8);
  ctx.stroke();

  // Right nostril
  const nosG2 = ctx.createRadialGradient(88, 82, 1, 88, 82, 5);
  nosG2.addColorStop(0, '#1A0A02');
  nosG2.addColorStop(0.6, '#3A1A08');
  nosG2.addColorStop(1, '#5A3020');
  ctx.fillStyle = nosG2;
  ctx.beginPath();
  ctx.ellipse(88, 82, 5, 3.5, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = rgba(cs.hi, 0.3);
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.ellipse(88, 81, 5.5, 3.2, 0.2, Math.PI * 1.2, Math.PI * 1.8);
  ctx.stroke();

  // === MOUTH LINE ===
  ctx.strokeStyle = 'rgba(80, 45, 25, 0.5)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(62, 88);
  ctx.quadraticCurveTo(78, 92, 94, 88);
  ctx.stroke();

  // === FACE MARKINGS ===
  if (cs.marking === 'star') {
    const starG = ctx.createRadialGradient(76, 22, 2, 76, 22, 10);
    starG.addColorStop(0, cs.markColor);
    starG.addColorStop(0.7, rgba(cs.markColor, 0.6));
    starG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = starG;
    ctx.beginPath();
    ctx.ellipse(76, 22, 9, 10, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (cs.marking === 'blaze') {
    ctx.fillStyle = cs.markColor;
    ctx.beginPath();
    ctx.moveTo(72, 8);
    ctx.bezierCurveTo(68, 18, 64, 38, 62, 55);
    ctx.bezierCurveTo(60, 68, 64, 78, 70, 84);
    ctx.lineTo(86, 84);
    ctx.bezierCurveTo(92, 78, 96, 68, 94, 55);
    ctx.bezierCurveTo(92, 38, 88, 18, 84, 8);
    ctx.bezierCurveTo(80, 4, 76, 4, 72, 8);
    ctx.fill();
    // Soft edges
    ctx.fillStyle = rgba(cs.body, 0.25);
    ctx.beginPath();
    ctx.moveTo(72, 8);
    ctx.bezierCurveTo(68, 18, 64, 38, 62, 55);
    ctx.lineTo(65, 55);
    ctx.bezierCurveTo(67, 38, 70, 18, 74, 8);
    ctx.closePath();
    ctx.fill();
  } else if (cs.marking === 'snip') {
    const snipG = ctx.createRadialGradient(78, 84, 2, 78, 84, 8);
    snipG.addColorStop(0, cs.markColor);
    snipG.addColorStop(0.7, rgba(cs.markColor, 0.5));
    snipG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = snipG;
    ctx.beginPath();
    ctx.ellipse(78, 84, 7, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (cs.marking === 'tobiano') {
    // Large white patches
    ctx.fillStyle = rgba(cs.markColor, 0.85);
    ctx.beginPath();
    ctx.moveTo(55, 40);
    ctx.bezierCurveTo(48, 50, 50, 70, 60, 80);
    ctx.bezierCurveTo(70, 88, 85, 86, 90, 78);
    ctx.bezierCurveTo(95, 65, 90, 45, 80, 38);
    ctx.bezierCurveTo(70, 32, 60, 34, 55, 40);
    ctx.fill();
  }

  // === DAPPLES ===
  if (cs.dapple) {
    for (let i = 0; i < 14; i++) {
      const x = 48 + Math.random() * 60;
      const y = 15 + Math.random() * 65;
      const r = 3 + Math.random() * 5;
      const dG = ctx.createRadialGradient(x, y, 0, x, y, r);
      dG.addColorStop(0, rgba(cs.hi, 0.35));
      dG.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = dG;
      ctx.beginPath();
      ctx.ellipse(x, y, r, r * 0.9, Math.random(), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // === EYES — detailed with iris rings, pupil, multiple highlights ===
  function drawEye(ex, ey, flipX) {
    // Eye socket shadow
    ctx.fillStyle = rgba(cs.dark, 0.3);
    ctx.beginPath();
    ctx.ellipse(ex, ey, 11, 10, flipX * 0.15, 0, Math.PI * 2);
    ctx.fill();

    // Sclera (white)
    const sclG = ctx.createRadialGradient(ex, ey, 2, ex, ey, 9);
    sclG.addColorStop(0, '#FAFAFA');
    sclG.addColorStop(0.7, '#F0EDE8');
    sclG.addColorStop(1, '#D8D0C8');
    ctx.fillStyle = sclG;
    ctx.beginPath();
    ctx.ellipse(ex, ey, 9, 8.5, flipX * 0.1, 0, Math.PI * 2);
    ctx.fill();

    // Iris — deep brown with ring detail
    const irisG = ctx.createRadialGradient(ex, ey, 1, ex, ey, 6.5);
    irisG.addColorStop(0, '#2A1505');
    irisG.addColorStop(0.3, '#4A2815');
    irisG.addColorStop(0.6, '#3A1A08');
    irisG.addColorStop(0.85, '#2A1205');
    irisG.addColorStop(1, '#1A0A02');
    ctx.fillStyle = irisG;
    ctx.beginPath();
    ctx.ellipse(ex, ey, 6.5, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Iris ring detail
    ctx.strokeStyle = 'rgba(80, 50, 20, 0.3)';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.ellipse(ex, ey, 4, 4.5, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Pupil
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(ex, ey + 0.5, 3.5, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Primary specular highlight
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.ellipse(ex + 2.5, ey - 2.5, 3, 2.5, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Secondary smaller highlight
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.ellipse(ex - 2, ey + 2, 1.5, 1, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Eyelid crease
    ctx.strokeStyle = rgba(cs.dark, 0.4);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(ex, ey - 1, 10, 7, flipX * 0.1, Math.PI * 1.1, Math.PI * 1.9);
    ctx.stroke();

    // Lower eyelid
    ctx.strokeStyle = rgba(cs.shadow, 0.3);
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.ellipse(ex, ey + 1, 9, 7, flipX * 0.1, 0.1, Math.PI * 0.9);
    ctx.stroke();
  }

  drawEye(58, 36, -1);
  drawEye(98, 36, 1);

  // === EARS — detailed with inner pink, fur tufts ===
  function drawEar(ex, ey, angle) {
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(angle);
    // Outer ear
    const earG = ctx.createLinearGradient(-4, -16, 4, -16);
    earG.addColorStop(0, cs.shadow);
    earG.addColorStop(0.5, cs.body);
    earG.addColorStop(1, cs.shadow);
    ctx.fillStyle = earG;
    ctx.beginPath();
    ctx.moveTo(-7, 0);
    ctx.bezierCurveTo(-9, -8, -5, -20, 0, -24);
    ctx.bezierCurveTo(5, -20, 9, -8, 7, 0);
    ctx.closePath();
    ctx.fill();
    // Inner ear (pink)
    const innerG = ctx.createLinearGradient(0, -18, 0, -2);
    innerG.addColorStop(0, cs.earInner);
    innerG.addColorStop(1, rgba(cs.earInner, 0.3));
    ctx.fillStyle = innerG;
    ctx.beginPath();
    ctx.moveTo(-4, -2);
    ctx.bezierCurveTo(-5, -8, -3, -16, 0, -20);
    ctx.bezierCurveTo(3, -16, 5, -8, 4, -2);
    ctx.closePath();
    ctx.fill();
    // Ear fur tufts at base
    ctx.strokeStyle = rgba(cs.mane, 0.4);
    ctx.lineWidth = 0.8;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(-3 + i * 3, 0);
      ctx.lineTo(-2 + i * 3, 4);
      ctx.stroke();
    }
    ctx.restore();
  }

  drawEar(50, 12, -0.35);
  drawEar(106, 12, 0.35);

  // === MANE — flowing yarn-like strands ===
  ctx.lineCap = 'round';
  for (let i = 0; i < 20; i++) {
    const startX = 50 + i * 3.2;
    const startY = 6 + Math.sin(i * 0.5) * 3;
    const endX = startX - 3 + Math.sin(i * 0.7) * 5;
    const endY = startY - 14 - Math.random() * 8;
    const cp1x = startX + Math.sin(i * 1.2) * 4;
    const cp1y = startY - 6;
    const cp2x = endX + Math.cos(i * 0.8) * 3;
    const cp2y = endY + 4;

    // Shadow strand
    ctx.strokeStyle = rgba(cs.mane, 0.5);
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(startX + 0.5, startY + 0.5);
    ctx.bezierCurveTo(cp1x + 0.5, cp1y + 0.5, cp2x + 0.5, cp2y + 0.5, endX + 0.5, endY + 0.5);
    ctx.stroke();

    // Main strand
    ctx.strokeStyle = i % 3 === 0 ? cs.maneHi : cs.mane;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, endY);
    ctx.stroke();

    // Highlight strand
    if (i % 4 === 0) {
      ctx.strokeStyle = rgba(cs.maneHi, 0.4);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(startX - 0.5, startY - 0.5);
      ctx.bezierCurveTo(cp1x - 0.5, cp1y - 0.5, cp2x - 0.5, cp2y - 0.5, endX - 0.5, endY - 0.5);
      ctx.stroke();
    }
  }

  // === BRIDLE — leather straps with stitching and buckles ===
  const bridleColor = '#3A2010';
  const bridleHi = '#6A4030';

  // Crown piece (over poll)
  ctx.strokeStyle = bridleColor;
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.moveTo(52, 18);
  ctx.quadraticCurveTo(78, 10, 104, 18);
  ctx.stroke();
  // Crown highlight
  ctx.strokeStyle = rgba(bridleHi, 0.5);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(54, 17);
  ctx.quadraticCurveTo(78, 9, 102, 17);
  ctx.stroke();

  // Browband
  ctx.strokeStyle = bridleColor;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(50, 24);
  ctx.quadraticCurveTo(78, 18, 106, 24);
  ctx.stroke();

  // Cheekpieces
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(52, 24);
  ctx.quadraticCurveTo(48, 45, 52, 68);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(104, 24);
  ctx.quadraticCurveTo(108, 45, 104, 68);
  ctx.stroke();

  // Noseband
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(56, 68);
  ctx.quadraticCurveTo(78, 72, 100, 68);
  ctx.stroke();

  // Throatlatch
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(60, 78);
  ctx.quadraticCurveTo(66, 90, 78, 92);
  ctx.quadraticCurveTo(90, 90, 96, 78);
  ctx.stroke();

  // Buckles (gold/brass)
  function drawBuckle(bx, by) {
    ctx.fillStyle = '#D4A830';
    ctx.fillRect(bx - 3, by - 3, 6, 6);
    ctx.strokeStyle = '#A08020';
    ctx.lineWidth = 0.8;
    ctx.strokeRect(bx - 3, by - 3, 6, 6);
    // Buckle pin
    ctx.strokeStyle = '#C09828';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(bx, by - 3);
    ctx.lineTo(bx, by + 3);
    ctx.stroke();
  }
  drawBuckle(52, 42);
  drawBuckle(104, 42);

  // Bridle stitching (tiny dashes along straps)
  ctx.strokeStyle = 'rgba(90,60,30,0.4)';
  ctx.lineWidth = 0.4;
  ctx.setLineDash([1.5, 2]);
  ctx.beginPath();
  ctx.moveTo(50, 25);
  ctx.quadraticCurveTo(46, 45, 50, 68);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(106, 25);
  ctx.quadraticCurveTo(110, 45, 106, 68);
  ctx.stroke();
  ctx.setLineDash([]);

  // === FUR TEXTURE — directional tiny strokes ===
  ctx.lineCap = 'round';
  for (let i = 0; i < 100; i++) {
    const x = 45 + Math.random() * 65;
    const y = 15 + Math.random() * 70;
    // Direction follows face contour — generally downward
    const angle = -0.3 + Math.random() * 0.6 + (x < 78 ? -0.2 : 0.2);
    const len = 1.5 + Math.random() * 2.5;
    ctx.strokeStyle = i % 3 === 0
      ? rgba(cs.hi, 0.08)
      : rgba(cs.dark, 0.06);
    ctx.lineWidth = 0.4 + Math.random() * 0.3;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(angle) * len, y + Math.sin(angle) * len);
    ctx.stroke();
  }

  // === PLUSH SEAM LINE — subtle stitching down center face ===
  ctx.strokeStyle = rgba(cs.dark, 0.12);
  ctx.lineWidth = 0.5;
  ctx.setLineDash([2, 3]);
  ctx.beginPath();
  ctx.moveTo(78, 5);
  ctx.quadraticCurveTo(76, 40, 78, 88);
  ctx.stroke();
  ctx.setLineDash([]);

  return c.toDataURL();
}

function createRunnerImage() {
  const c = document.createElement('canvas');

  ctx.fillStyle = helmG;
  ctx.beginPath();
  ctx.ellipse(20, 12, 9, 11, 0, 0, Math.PI * 2);
  ctx.fill();
  // Helmet visor
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(20, 6, 10, 4, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Face
  ctx.fillStyle = '#E8C8A8';
  ctx.beginPath();
  ctx.ellipse(20, 19, 6, 7, 0, 0, Math.PI * 2);

  jacketG.addColorStop(1, '#1a2744');
  ctx.fillStyle = jacketG;
  ctx.fillRect(10, 27, 20, 18);

  // Arms (reaching forward to hold horse)
  ctx.fillStyle = '#1a2744';
  ctx.save();
  ctx.translate(28, 30);
  ctx.rotate(0.3);
  ctx.fillRect(0, 0, 6, 12);
  ctx.restore();
  // Hand
  ctx.fillStyle = '#E8C8A8';
  ctx.fillRect(31, 28, 5, 5);

  ctx.fillStyle = '#1a2744';
  ctx.save();
  ctx.translate(6, 30);
  ctx.rotate(-0.3);
  ctx.fillRect(0, 0, 6, 12);

  // Breeches (tan)
  ctx.fillStyle = '#D4A76A';

  // Tall boots
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(10, 52, 8, 8);
  ctx.fillRect(22, 52, 8, 8);

  return c.toDataURL();
}

// OBSTACLE AND COLLECTIBLE SPRITES
// ============================================================
function createJumpImage() {
  const c = document.createElement('canvas');
  c.width = 70; c.height = 50;
  const ctx = c.getContext('2d');

  // Support standards (white posts)
  ctx.fillStyle = '#F0F0F0';
  ctx.fillRect(4, 5, 6, 45);
  ctx.fillRect(60, 5, 6, 45);
  // Post shadows
  ctx.fillStyle = '#D0D0D0';
  ctx.fillRect(8, 5, 2, 45);
  ctx.fillRect(64, 5, 2, 45);
  // Post tops (cups)
  ctx.fillStyle = '#888';
  ctx.fillRect(2, 3, 10, 4);
  ctx.fillRect(58, 3, 10, 4);

  // Rails (red/white striped)
  for (let r = 0; r < 2; r++) {
    const ry = 10 + r * 16;
    // Rail shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(8, ry + 2, 54, 8);
    // Rail body
    const railG = ctx.createLinearGradient(0, ry, 0, ry + 8);
    railG.addColorStop(0, r === 0 ? '#E8E8E8' : '#CC2020');
    railG.addColorStop(0.5, r === 0 ? '#FFF' : '#FF3030');
    railG.addColorStop(1, r === 0 ? '#D0D0D0' : '#AA1818');
    ctx.fillStyle = railG;
    ctx.fillRect(8, ry, 54, 8);
  }

  return c.toDataURL();
}

function createCarrotImage() {
  const c = document.createElement('canvas');
  c.width = 24; c.height = 36;
  const ctx = c.getContext('2d');

  // Carrot body
  const carG = ctx.createLinearGradient(8, 8, 16, 32);
  carG.addColorStop(0, '#FF9030');
  carG.addColorStop(0.5, '#FF7010');
  carG.addColorStop(1, '#CC5500');
  ctx.fillStyle = carG;
  ctx.beginPath();
  ctx.moveTo(8, 10);
  ctx.quadraticCurveTo(5, 20, 12, 34);
  ctx.quadraticCurveTo(19, 20, 16, 10);
  ctx.closePath();
  ctx.fill();

  // Carrot lines
  ctx.strokeStyle = 'rgba(180,80,0,0.3)';
  ctx.lineWidth = 0.5;
  for (let y = 14; y < 30; y += 4) {
    ctx.beginPath();
    ctx.moveTo(7, y);
    ctx.lineTo(17, y);
    ctx.stroke();
  }

  // Green top
  ctx.fillStyle = '#228B22';
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(12, 10);
    ctx.quadraticCurveTo(12 + i * 3, 2, 12 + i * 4, 0);
    ctx.quadraticCurveTo(12 + i * 3, 3, 12, 10);
    ctx.fill();
  }

  return c.toDataURL();
}

function createHorseshoeImage() {
  const c = document.createElement('canvas');
  c.width = 40; c.height = 40;
  const ctx = c.getContext('2d');

  // Horseshoe
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(20, 18, 14, 0.3, Math.PI - 0.3);
  ctx.stroke();

  // Inner highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(20, 18, 12, 0.5, Math.PI - 0.5);
  ctx.stroke();

  // Nail holes
  ctx.fillStyle = '#DAA520';
  const angles = [0.6, 1.1, Math.PI - 1.1, Math.PI - 0.6];
  angles.forEach(a => {
    ctx.beginPath();
    ctx.arc(20 + Math.cos(a) * 13, 18 + Math.sin(a) * 13, 1.5, 0, Math.PI * 2);
    ctx.fill();
  });

  return c.toDataURL();
}

function createWaterImage() {
  const c = document.createElement('canvas');
  c.width = 70; c.height = 20;
  const ctx = c.getContext('2d');
  const wG = ctx.createLinearGradient(0, 0, 0, 20);
  wG.addColorStop(0, '#64B5F6');
  wG.addColorStop(1, '#1E88E5');
  ctx.fillStyle = wG;
  ctx.fillRect(0, 0, 70, 20);
  // Waves
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1.2;
  for (let row = 0; row < 3; row++) {
    ctx.beginPath();
    for (let x = 0; x <= 70; x += 2) {
      const y = 5 + row * 6 + Math.sin(x * 0.15 + row) * 2;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  return c.toDataURL();
}

function createHedgeImage() {
  const c = document.createElement('canvas');
  c.width = 70; c.height = 50;
  const ctx = c.getContext('2d');
  // Bush base
  ctx.fillStyle = '#1B5E20';
  ctx.fillRect(0, 20, 70, 30);
  // Bush tops
  const colors = ['#2E7D32', '#388E3C', '#1B5E20', '#43A047'];
  for (let i = 0; i < 6; i++) {
    ctx.fillStyle = colors[i % 4];
    ctx.beginPath();
    ctx.ellipse(8 + i * 11, 22, 10, 14, 0, Math.PI, Math.PI * 2);
    ctx.fill();
  }
  // Leaf highlights
  ctx.fillStyle = 'rgba(100,200,100,0.2)';
  for (let i = 0; i < 10; i++) {
    ctx.beginPath();
    ctx.ellipse(5 + Math.random() * 60, 10 + Math.random() * 30, 3, 2, Math.random(), 0, Math.PI * 2);
    ctx.fill();
  }
  return c.toDataURL();
}

function createDustImage() {
  const c = document.createElement('canvas');
  c.width = 30; c.height = 30;
  const ctx = c.getContext('2d');
  const dG = ctx.createRadialGradient(15, 15, 2, 15, 15, 14);
  dG.addColorStop(0, 'rgba(200,180,140,0.6)');
  dG.addColorStop(1, 'rgba(200,180,140,0)');
  ctx.fillStyle = dG;
  ctx.beginPath();
  ctx.arc(15, 15, 14, 0, Math.PI * 2);
  ctx.fill();
  return c.toDataURL();
}

// ============================================================
// BOOT SCENE — load all textures, wait for async completion
// ============================================================
class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }

  create() {
    this.add.rectangle(GW / 2, GH / 2, GW, GH, 0x1a3320);
    this.add.text(GW / 2, GH / 2, 'Loading...', {
      fontFamily: "'Georgia', serif", fontSize: 28, color: '#FFD700'
    }).setOrigin(0.5);

    const expected = new Set([
      'chestnut','blackBeauty','dappleGrey','palomino','paint',
      'carrot','horseshoe','runner1','runner2','jump','water','hedge','dust'
    ]);
    const loaded = new Set();

    const checkDone = (key) => {
      if (expected.has(key)) {
        loaded.add(key);
        if (loaded.size >= expected.size) {
          this.textures.off('addtexture', checkDone);
          this.scene.start('TitleScene');
        }
      }
    };
    this.textures.on('addtexture', checkDone);

    // Generate textures
    Object.keys(HORSE_COLORS).forEach(k =>
      this.textures.addBase64(k, createHobbyHorseImage(HORSE_COLORS[k]))
    );
    this.textures.addBase64('carrot', createCarrotImage());
    this.textures.addBase64('horseshoe', createHorseshoeImage());
    this.textures.addBase64('runner1', createRunnerImage());
    this.textures.addBase64('runner2', createRunnerImage2());
    this.textures.addBase64('jump', createJumpImage());
    this.textures.addBase64('water', createWaterImage());
    this.textures.addBase64('hedge', createHedgeImage());
    this.textures.addBase64('dust', createDustImage());

    // Safety timeout
    this.time.delayedCall(6000, () => {
      if (loaded.size < expected.size) {
        this.textures.off('addtexture', checkDone);
        this.scene.start('TitleScene');
      }
    });
  }
}

// ============================================================
// SELECT SCENE — choose your horse
// ============================================================
class SelectScene extends Phaser.Scene {
  constructor() { super('SelectScene'); this.selectedIndex = 0; }

  create() {
    this.selectedIndex = 0;
    this.add.rectangle(GW / 2, GH / 2, GW, GH, 0xB0D4E3);
    this.add.rectangle(GW / 2, GH - 40, GW, 80, 0x2d5016);

    // Title
    this.add.rectangle(GW / 2, 45, 500, 60, 0x000000, 0.7).setStrokeStyle(2, 0xFFD700);
    this.add.text(GW / 2, 45, 'Choose Your Horse', {
      fontFamily: "'Georgia', serif", fontSize: 32, fontStyle: 'bold', color: '#FFD700'
    }).setOrigin(0.5);

    const keys = Object.keys(HORSE_COLORS);
    const names = keys.map(k => HORSE_COLORS[k].name);
    const spacing = GW / (keys.length + 1);

    this.horses = [];
    this.selectionRing = null;

    keys.forEach((key, i) => {
      const x = spacing * (i + 1);
      const y = 210;

      // Background circle
      const bg = this.add.circle(x, y, 58, 0x000000, 0.2);

      // Horse image
      const horse = this.add.image(x, y - 5, key).setScale(0.55);

      // Name
      this.add.rectangle(x, y + 58, 100, 24, 0x000000, 0.6);
      const label = this.add.text(x, y + 58, names[i], {
        fontFamily: "'Georgia', serif", fontSize: 14, color: '#FFFFFF'
      }).setOrigin(0.5);

      this.horses.push({ key, x, y, horse, bg, label });

      // Click/tap to select
      bg.setInteractive(new Phaser.Geom.Circle(0, 0, 58), Phaser.Geom.Circle.Contains);
      horse.setInteractive();
      bg.on('pointerdown', () => { this.selectedIndex = i; this.updateSelection(); this.time.delayedCall(250, () => this.startGame()); });
      horse.on('pointerdown', () => { this.selectedIndex = i; this.updateSelection(); this.time.delayedCall(250, () => this.startGame()); });
    });

    // Selection ring
    this.selectionRing = this.add.circle(0, 0, 64).setStrokeStyle(4, 0xFFD700);
    this.updateSelection();

    // Instructions
    this.add.rectangle(GW / 2, GH - 100, 500, 70, 0x000000, 0.7);
    this.add.text(GW / 2, GH - 110, 'Arrow Keys / Tap to select', {
      fontFamily: "'Georgia', serif", fontSize: 16, color: '#FFFFFF'
    }).setOrigin(0.5);
    this.add.text(GW / 2, GH - 88, 'ENTER / SPACE / Tap horse to start', {
      fontFamily: "'Georgia', serif", fontSize: 16, color: '#FFD700'
    }).setOrigin(0.5);

    // Keyboard
    this.input.keyboard.on('keydown-LEFT', () => {
      this.selectedIndex = (this.selectedIndex - 1 + keys.length) % keys.length;
      this.updateSelection();
    });
    this.input.keyboard.on('keydown-RIGHT', () => {
      this.selectedIndex = (this.selectedIndex + 1) % keys.length;
      this.updateSelection();
    });
    this.input.keyboard.on('keydown-RETURN', () => this.startGame());
    this.input.keyboard.on('keydown-SPACE', () => this.startGame());
  }

  updateSelection() {
    const h = this.horses[this.selectedIndex];
    this.selectionRing.setPosition(h.x, h.y);
    this.horses.forEach((item, i) => {
      item.horse.setScale(i === this.selectedIndex ? 0.7 : 0.55);
      item.bg.setFillStyle(i === this.selectedIndex ? 0x2d5016 : 0x000000, i === this.selectedIndex ? 0.3 : 0.2);
    });
  }

  startGame() {
    this.scene.start('GameScene', { horse: this.horses[this.selectedIndex].key });
  }
}

// ============================================================
// GAME SCENE — main gameplay
// ============================================================
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  init(data) { this.selectedHorse = data.horse || 'chestnut'; }

  create() {
    // Sky
    this.add.rectangle(GW / 2, GH / 2, GW, GH, 0xB0D4E3);

    // Clouds
    this.clouds = [];
    for (let i = 0; i < 4; i++) {
      const cx = 80 + i * 220 + Math.random() * 40;
      const cy = 40 + Math.random() * 50;
      const cloud = this.add.container(cx, cy);
      for (let j = 0; j < 3; j++) {
        cloud.add(this.add.ellipse(j * 20 - 20, Math.random() * 6, 40 + Math.random() * 20, 18 + Math.random() * 8, 0xFFFFFF, 0.7));
      }
      this.clouds.push(cloud);
    }

    // Grass layers (parallax look)
    this.add.rectangle(GW / 2, GROUND_Y + 40, GW, 80, 0x2d5016);
    this.add.rectangle(GW / 2, GROUND_Y + 2, GW, 6, 0x3d7a1e);

    // === PHYSICS GROUND — exactly at the grass surface ===
    const ground = this.add.rectangle(GW / 2, GROUND_Y + 4, GW, 8, 0x000000, 0);
    this.physics.add.existing(ground, true);
    this.ground = ground;

    // Game state
    this.scrollSpeed = 5;
    this.gameActive = true;
    this.score = 0;
    this.faults = 0;
    this.distance = 0;
    this.cleanStreakCounter = 0;
    this.lastMilestone = 0;
    this.jumpsLeft = 2;
    this.isOnGround = true;
    this.usedDoubleJump = false;
    this.spawnTimer = 0;
    this.hitCooldown = false;

    // === PLAYER — combined rider + horse as a container ===
    // Runner sprite (the body)
    this.player = this.physics.add.sprite(150, GROUND_Y - 30, 'runner1');
    this.player.setSize(24, 50); // tighter hitbox
    this.player.setBounce(0);
    this.player.setCollideWorldBounds(true);
    this.player.body.setGravityY(200); // extra gravity for snappier feel

    // Horse head (follows player, visual only)
    this.playerHorse = this.add.image(150, GROUND_Y - 80, this.selectedHorse);
    this.playerHorse.setScale(0.5);

    // Animation
    if (!this.anims.exists('run')) {
      this.anims.create({
        key: 'run',
        frames: [{ key: 'runner1' }, { key: 'runner2' }],
        frameRate: 8, repeat: -1
      });
    }
    this.player.play('run');

    // Groups
    this.obstacles = this.physics.add.group();
    this.collectibles = this.physics.add.group();

    // Ground collision
    this.physics.add.collider(this.player, this.ground, () => {
      // Reliable ground detection via collider callback
      if (!this.isOnGround) {
        this.isOnGround = true;
        if (this.usedDoubleJump) {
          this.usedDoubleJump = false;
          this.addScore(50, 'STYLE! +50', 0xAA44FF);
        }
        this.jumpsLeft = 2;
      }
    });

    // Obstacle/collectible overlap
    this.physics.add.overlap(this.player, this.obstacles, (p, obs) => this.hitObstacle(obs));
    this.physics.add.overlap(this.player, this.collectibles, (p, col) => this.collectItem(col));

    // === CONTROLS — keyboard + touch ===
    // Keyboard
    this.input.keyboard.on('keydown-SPACE', () => this.jump());
    this.input.keyboard.on('keydown-UP', () => this.jump());
    this.input.keyboard.on('keydown-W', () => this.jump());

    // Touch/click — tap anywhere to jump
    this.input.on('pointerdown', (pointer) => {
      // Only jump if tap is in the lower 2/3 of screen (upper area reserved for HUD)
      if (pointer.y > 60) this.jump();
    });

    // HUD
    this.createHUD();
  }

  createHUD() {
    const hudBg = this.add.rectangle(0, 0, GW, 50, 0x000000, 0.75);
    hudBg.setOrigin(0, 0);
    hudBg.setDepth(100);

    this.scoreText = this.add.text(20, 25, 'Score: 0', {
      fontFamily: "'Georgia', serif", fontSize: 20, fontStyle: 'bold', color: '#FFD700'
    }).setOrigin(0, 0.5).setDepth(100);

    this.distanceText = this.add.text(GW / 2, 25, '0m', {
      fontFamily: "'Georgia', serif", fontSize: 18, color: '#FFFFFF'
    }).setOrigin(0.5).setDepth(100);

    // Fault indicators (3 horse shoes — fill red when faulted)
    this.faultIcons = [];
    for (let i = 0; i < 3; i++) {
      const icon = this.add.text(GW - 100 + i * 30, 25, '\u2764', {
        fontSize: 22, color: '#FF6B6B'
      }).setOrigin(0.5).setDepth(100);
      this.faultIcons.push(icon);
    }

    // Jump indicator
    this.jumpIndicator = this.add.text(GW - 180, 25, 'JUMPS: 2', {
      fontFamily: "'Georgia', serif", fontSize: 14, color: '#88DDFF'
    }).setOrigin(0.5).setDepth(100);
  }

  jump() {
    if (!this.gameActive) return;

    if (this.jumpsLeft > 0) {
      const isFirstJump = this.jumpsLeft === 2;
      const force = isFirstJump ? -420 : -320;

      this.player.setVelocityY(force);
      this.jumpsLeft--;
      this.isOnGround = false;

      // Update HUD
      this.jumpIndicator.setText('JUMPS: ' + this.jumpsLeft);

      if (!isFirstJump) {
        this.usedDoubleJump = true;
        // Dust puff visual effect
        for (let i = 0; i < 4; i++) {
          const p = this.add.circle(
            this.player.x + Phaser.Math.Between(-12, 12),
            this.player.y + 20,
            Phaser.Math.Between(3, 7), 0xCCCCCC, 0.5
          );
          p.setDepth(50);
          this.tweens.add({
            targets: p, y: p.y + 20, alpha: 0, scale: 2.5,
            duration: 400, onComplete: () => p.destroy()
          });
        }
        // Double jump text
        this.showFloatingText(this.player.x, this.player.y - 40, 'DOUBLE JUMP!', '#88DDFF');
      }
    }
  }

  update(time, delta) {
    if (!this.gameActive) return;

    // Horse head follows player
    this.playerHorse.x = this.player.x + 5;
    this.playerHorse.y = this.player.y - 48;

    // Bob horse slightly when running on ground
    if (this.isOnGround) {
      this.playerHorse.y += Math.sin(time * 0.008) * 2;
    }

    // Cloud parallax
    this.clouds.forEach(cloud => {
      cloud.x -= this.scrollSpeed * 0.15;
      if (cloud.x < -80) cloud.x = GW + 80;
    });

    // Distance
    this.distance += this.scrollSpeed / 100;
    this.distanceText.setText(Math.floor(this.distance) + 'm');

    // Milestone bonus
    const milestone = Math.floor(this.distance / 50);
    if (milestone > this.lastMilestone) {
      this.lastMilestone = milestone;
      this.addScore(50, '50m BONUS!', 0xFFD700);
      // Gradually increase speed
      this.scrollSpeed = Math.min(10, 5 + milestone * 0.3);
    }

    // Spawn obstacles
    this.spawnTimer += delta;
    const spawnInterval = Math.max(1200, 2800 - this.distance * 3);
    if (this.spawnTimer > spawnInterval) {
      this.spawnTimer = 0;
      this.spawnObstacle();
    }

    // Spawn collectibles
    if (Math.random() < 0.008) {
      this.spawnCollectible();
    }

    // Check obstacle clears
    this.obstacles.children.entries.forEach(obs => {
      if (obs.active && !obs.getData('cleared') && obs.x < this.player.x - 30) {
        obs.setData('cleared', true);
        this.cleanStreakCounter++;
        this.addScore(100, 'CLEAR! +100', 0x4CAF50);
        if (this.cleanStreakCounter >= 3 && this.cleanStreakCounter % 3 === 0) {
          this.addScore(200, 'PERFECT STREAK! +200', 0xFF8C00);
        }
      }
    });

    // Ground detection backup (in case collider doesn't fire)
    if (this.player.body.blocked.down && !this.isOnGround) {
      this.isOnGround = true;
      this.jumpsLeft = 2;
    }

    // Update jump indicator
    this.jumpIndicator.setText('JUMPS: ' + this.jumpsLeft);

    // Cleanup off-screen objects
    this.obstacles.children.entries.forEach(obs => {
      if (obs.active && obs.x < -100) obs.destroy();
    });
    this.collectibles.children.entries.forEach(col => {
      if (col.active && col.x < -100) col.destroy();
    });
  }

  spawnObstacle() {
    const types = ['jump', 'water', 'hedge'];
    const type = types[Math.floor(Math.random() * types.length)];

    // Place obstacles on the ground
    let yPos;
    if (type === 'water') {
      yPos = GROUND_Y - 8; // flat on ground
    } else {
      yPos = GROUND_Y - 22; // slightly above ground
    }

    const obs = this.obstacles.create(GW + 60, yPos, type);
    obs.body.allowGravity = false;
    obs.body.immovable = true;
    obs.setVelocityX(-this.scrollSpeed * 30);
    obs.setData('type', type);
    obs.setData('cleared', false);
  }

  spawnCollectible() {
    const isHorseshoe = Math.random() < 0.12;
    const type = isHorseshoe ? 'horseshoe' : 'carrot';
    // Collectibles float in the air — reachable by jumping
    const yPos = GROUND_Y - 80 - Math.random() * 120;

    const col = this.collectibles.create(GW + 50, yPos, type);
    col.body.allowGravity = false;
    col.setVelocityX(-this.scrollSpeed * 30);
    col.setData('type', type);
  }

  hitObstacle(obs) {
    if (!this.gameActive || this.hitCooldown) return;
    this.hitCooldown = true;
    this.time.delayedCall(800, () => { this.hitCooldown = false; });

    this.faults++;
    this.cleanStreakCounter = 0;

    // Update fault hearts
    if (this.faults <= 3 && this.faultIcons[this.faults - 1]) {
      this.faultIcons[this.faults - 1].setColor('#333');
    }

    // Camera shake
    this.cameras.main.shake(200, 0.01);

    // Knockback flash
    this.player.setTint(0xFF0000);
    this.time.delayedCall(300, () => { this.player.clearTint(); });

    // Dust
    const dust = this.add.sprite(this.player.x, this.player.y, 'dust').setAlpha(0.8);
    this.tweens.add({ targets: dust, alpha: 0, scale: 2, duration: 400, onComplete: () => dust.destroy() });

    if (obs && obs.active) obs.destroy();

    this.showFloatingText(this.player.x, this.player.y - 50, 'FAULT!', '#FF4444');

    if (this.faults >= 3) {
      this.gameActive = false;
      this.time.delayedCall(600, () => this.gameOver());
    }
  }

  collectItem(col) {
    const type = col.getData('type');
    if (type === 'carrot') {
      this.addScore(25, '+25', 0xFF8C00);
    } else if (type === 'horseshoe') {
      this.addScore(100, 'LUCKY! +100', 0xFFD700);
    }
    col.destroy();
  }

  addScore(points, label, color) {
    this.score += points;
    this.scoreText.setText('Score: ' + this.score);
    this.showFloatingText(GW / 2, 80, label, '#' + color.toString(16).padStart(6, '0'));
  }

  showFloatingText(x, y, text, color) {
    const ft = this.add.text(x, y, text, {
      fontFamily: "'Georgia', serif", fontSize: 22, fontStyle: 'bold',
      color: color, stroke: '#000', strokeThickness: 2
    }).setOrigin(0.5).setDepth(90);
    this.tweens.add({
      targets: ft, y: y - 50, alpha: 0,
      duration: 1000, onComplete: () => ft.destroy()
    });
  }

  gameOver() {
    this.scene.start('GameOverScene', {
      score: this.score,
      distance: Math.floor(this.distance)
    });
  }
}

// ============================================================
// GAME OVER SCENE
// ============================================================
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOverScene'); }

  init(data) {
    this.finalScore = data.score || 0;
    this.finalDistance = data.distance || 0;
  }

  create() {
    this.add.rectangle(GW / 2, GH / 2, GW, GH, 0xB0D4E3);
    this.add.rectangle(GW / 2, GH - 40, GW, 80, 0x2d5016);

    // Results panel
    this.add.rectangle(GW / 2, GH / 2 - 40, 500, 280, 0x000000, 0.85).setStrokeStyle(2, 0xFFD700);

    this.add.text(GW / 2, GH / 2 - 140, 'GAME OVER', {
      fontFamily: "'Georgia', serif", fontSize: 44, fontStyle: 'bold', color: '#FF6B6B'
    }).setOrigin(0.5);

    this.add.text(GW / 2, GH / 2 - 80, 'Score: ' + this.finalScore, {
      fontFamily: "'Georgia', serif", fontSize: 28, fontStyle: 'bold', color: '#FFD700'
    }).setOrigin(0.5);

    this.add.text(GW / 2, GH / 2 - 45, 'Distance: ' + this.finalDistance + 'm', {
      fontFamily: "'Georgia', serif", fontSize: 22, color: '#FFFFFF'
    }).setOrigin(0.5);

    // Initials entry
    this.add.text(GW / 2, GH / 2 + 10, 'Enter Your Initials:', {
      fontFamily: "'Georgia', serif", fontSize: 18, color: '#FFFFFF'
    }).setOrigin(0.5);

    this.initials = '';
    this.initialsText = this.add.text(GW / 2, GH / 2 + 55, '_ _ _', {
      fontFamily: "'Georgia', serif", fontSize: 40, fontStyle: 'bold', color: '#FFD700'
    }).setOrigin(0.5);

    this.add.text(GW / 2, GH / 2 + 100, 'Type 3 letters, then ENTER', {
      fontFamily: "'Georgia', serif", fontSize: 14, color: '#AAA'
    }).setOrigin(0.5);

    this.input.keyboard.on('keydown', (e) => {
      if (this.initials.length < 3 && /^[a-zA-Z]$/.test(e.key)) {
        this.initials += e.key.toUpperCase();
        this.updateInitials();
      } else if (e.key === 'Backspace') {
        this.initials = this.initials.slice(0, -1);
        this.updateInitials();
      } else if (e.key === 'Enter' && this.initials.length === 3) {
        this.submitScore();
      }
    });

    // Play again without saving
    this.add.rectangle(GW / 2, GH - 80, 300, 40, 0x000000, 0.7);
    const retryText = this.add.text(GW / 2, GH - 80, 'TAP or SPACE to play again', {
      fontFamily: "'Georgia', serif", fontSize: 14, color: '#88DDFF'
    }).setOrigin(0.5);
    this.tweens.add({ targets: retryText, alpha: 0.4, duration: 800, yoyo: true, repeat: -1 });

    this.input.on('pointerdown', () => this.scene.start('SelectScene'));
    this.input.keyboard.on('keydown-SPACE', () => this.scene.start('SelectScene'));
  }

  updateInitials() {
    const chars = this.initials.split('');
    while (chars.length < 3) chars.push('_');
    this.initialsText.setText(chars.join(' '));
  }

  submitScore() {
    const scores = JSON.parse(localStorage.getItem('hobbyHorseScores') || '[]');
    scores.push({ name: this.initials, score: this.finalScore, distance: this.finalDistance });
    scores.sort((a, b) => b.score - a.score);
    scores.splice(10);
    localStorage.setItem('hobbyHorseScores', JSON.stringify(scores));
    this.scene.start('HighScoresScene');
  }
}

// ============================================================
// HIGH SCORES SCENE
// ============================================================
class HighScoresScene extends Phaser.Scene {
  constructor() { super('HighScoresScene'); }

  create() {
    this.add.rectangle(GW / 2, GH / 2, GW, GH, 0xB0D4E3);
    this.add.rectangle(GW / 2, GH - 40, GW, 80, 0x2d5016);

    // Panel
    this.add.rectangle(GW / 2, GH / 2, 500, GH - 80, 0x000000, 0.85).setStrokeStyle(2, 0xFFD700);

    this.add.text(GW / 2, 40, 'HIGH SCORES', {
      fontFamily: "'Georgia', serif", fontSize: 36, fontStyle: 'bold', color: '#FFD700'
    }).setOrigin(0.5);

    const scores = JSON.parse(localStorage.getItem('hobbyHorseScores') || '[]');

    if (scores.length === 0) {
      this.add.text(GW / 2, GH / 2, 'No scores yet!\nPlay to set a record!', {
        fontFamily: "'Georgia', serif", fontSize: 22, color: '#FFF', align: 'center'
      }).setOrigin(0.5);
    } else {
      // Header
      this.add.text(200, 75, 'RANK', { fontFamily: "'Georgia', serif", fontSize: 14, color: '#AAA' }).setOrigin(0.5);
      this.add.text(300, 75, 'NAME', { fontFamily: "'Georgia', serif", fontSize: 14, color: '#AAA' }).setOrigin(0.5);
      this.add.text(480, 75, 'SCORE', { fontFamily: "'Georgia', serif", fontSize: 14, color: '#AAA' }).setOrigin(0.5);
      this.add.text(600, 75, 'DIST', { fontFamily: "'Georgia', serif", fontSize: 14, color: '#AAA' }).setOrigin(0.5);

      scores.slice(0, 10).forEach((s, i) => {
        const y = 105 + i * 38;
        const medalColors = ['#FFD700', '#C0C0C0', '#CD7F32'];
        const col = i < 3 ? medalColors[i] : '#FFFFFF';
        this.add.text(200, y, '#' + (i + 1), { fontFamily: "'Georgia', serif", fontSize: 20, fontStyle: 'bold', color: col }).setOrigin(0.5);
        this.add.text(300, y, s.name, { fontFamily: "'Georgia', serif", fontSize: 20, color: '#FFF' }).setOrigin(0.5);
        this.add.text(480, y, s.score.toString(), { fontFamily: "'Georgia', serif", fontSize: 20, fontStyle: 'bold', color: '#FFD700' }).setOrigin(0.5);
        this.add.text(600, y, s.distance + 'm', { fontFamily: "'Georgia', serif", fontSize: 18, color: '#AAA' }).setOrigin(0.5);
      });
    }

    this.add.rectangle(GW / 2, GH - 50, 300, 36, 0x000000, 0.7);
    this.add.text(GW / 2, GH - 50, 'TAP or SPACE to play again', {
      fontFamily: "'Georgia', serif", fontSize: 16, color: '#88DDFF'
    }).setOrigin(0.5);

    this.input.keyboard.on('keydown-SPACE', () => this.scene.start('SelectScene'));
    this.input.keyboard.on('keydown-RETURN', () => this.scene.start('SelectScene'));
    this.input.on('pointerdown', () => this.scene.start('SelectScene'));
  }
}

const config = {
  type: Phaser.AUTO,
  width: GW,
  height: GH,
  parent: 'game-container',
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 600 }, debug: false }
  },
  scene: [BootScene, TitleScene, SelectScene, GameScene, GameOverScene, HighScoresScene],
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    expandParent: true
  }
};

const game = new Phaser.Game(config);
