<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enderle Casa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #a0a0b0;
            margin-bottom: 3rem;
        }
        .projects {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            padding: 0 2rem;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 2rem;
            width: 280px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
            text-decoration: none;
            color: #fff;
            display: block;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: #e94560;
        }
        .card .icon { font-size: 3rem; margin-bottom: 1rem; }
        .card h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
        .card p { font-size: 0.9rem; color: #a0a0b0; }
    </style>
</head>
<body>
    <h1>Enderle Casa</h1>
    <p class="subtitle">Projects &amp; Games</p>
    <div class="projects">
        <a href="/HorseGame/" class="card">
            <div class="icon">&#127942;</div>
            <h2>Hobby Horse Championship</h2>
            <p>Race through show jumping, barrel racing, and cross-country courses with your hobby horse!</p>
        </a>
    </div>
</body>
</html>
